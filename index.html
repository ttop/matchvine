<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchvine — Tournament Bracket Maker</title>
  <style>
    /* ── Reset / Base ──────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: white;
      color: #111827;
    }

    /* ── Utility ───────────────────────────────────────────────────────────── */
    .hidden {
      display: none !important;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Toolbar ───────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      height: 52px;
      background: white;
      position: relative;
      z-index: 10;
    }

    #app-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      margin-right: 4px;
    }

    #bracket-title {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      outline: none;
      min-width: 120px;
      max-width: 280px;
      transition: border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bracket-title:focus {
      border-color: #3b82f6;
    }

    #bracket-title:hover:not(:focus) {
      border-color: #d1d5db;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #e5e7eb;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
      font-family: inherit;
    }

    .toolbar-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .toolbar-btn:active {
      background: #f3f4f6;
    }

    .toolbar-btn:focus-visible,
    .size-toggle:focus-visible,
    .font-option:focus-visible,
    .dialog-close:focus-visible,
    .color-swatch:focus-visible,
    .bracket-entry:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    .toolbar-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .toolbar-spacer {
      flex: 1;
    }

    /* ── Bracket Container ─────────────────────────────────────────────────── */
    #bracket-container {
      width: 100%;
      height: calc(100vh - 52px);
      overflow: auto;
      position: relative;
      background: white;
    }

    /* ── Cells ─────────────────────────────────────────────────────────────── */
    .cell {
      border-radius: 8px;
      width: 200px;
      height: 56px;
      cursor: pointer;
      position: absolute;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 1.5px solid #d1d5db;
      overflow: hidden;
      user-select: none;
      background: white;
    }

    .cell:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    .cell-editing {
      border-color: #3b82f6;
      border-width: 2px;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .cell-empty {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .cell-text {
      display: block;
      width: 100%;
      text-align: center;
      outline: none;
      word-break: break-word;
      padding: 4px 8px;
      box-sizing: border-box;
      line-height: 1.2;
      overflow: hidden;
    }

    /* Make cell-text not intercept drag events when cell is draggable */
    .cell[draggable="true"] .cell-text {
      pointer-events: none;
    }

    /* Allow text selection inside a cell that is being edited */
    .cell-text[contenteditable="true"] {
      pointer-events: auto;
      user-select: text;
      cursor: text;
    }

    .cell-winner {
      border-color: #22c55e;
      border-width: 2px;
    }

    .cell-loser {
      opacity: 0.5;
    }

    .cell-champion {
      border-color: #f59e0b;
      border-width: 2.5px;
      width: 220px;
    }

    /* ── Promote Button ────────────────────────────────────────────────────── */
    .promote-btn {
      width: 26px;
      height: 26px;
      background: #e5e7eb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
      font-weight: bold;
      position: absolute;
    }

    .promote-btn:hover {
      background: #d1d5db;
    }

    /* ── Demote Button ─────────────────────────────────────────────────────── */
    .demote-btn {
      width: 20px;
      height: 20px;
      background: #ef4444;
      border-radius: 50%;
      position: absolute;
      top: -8px;
      right: -8px;
      display: none;
      color: white;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .cell:hover .demote-btn {
      display: flex;
    }

    /* ── Format Icon ───────────────────────────────────────────────────────── */
    .format-icon {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 5px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #d1d5db;
    }

    .cell:hover .format-icon {
      display: flex;
    }

    /* ── Round Labels ──────────────────────────────────────────────────────── */
    .round-label {
      position: absolute;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      font-weight: 500;
    }

    /* ── Seed Number Labels ────────────────────────────────────────────────── */
    .seed-number {
      position: absolute;
      font-size: 14px;
      color: #6b7280;
      font-weight: 500;
    }

    /* ── Bracket Title (on canvas) ────────────────────────────────────────── */
    .bracket-title-display {
      position: absolute;
      text-align: center;
      font-size: 42px;
      font-weight: 700;
      color: #1f2937;
      cursor: pointer;
    }
    .bracket-title-display:hover {
      color: #3b82f6;
    }

    /* ── Color Palette Grid ────────────────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #d1d5db;
    }

    .color-swatch.selected {
      border: 3px solid #3b82f6;
    }

    /* ── Dialog / Modal ────────────────────────────────────────────────────── */
    .dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      width: calc(100% - 32px);
      z-index: 1000;
      overflow: hidden;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .dialog-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .dialog-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      color: #6b7280;
      font-family: inherit;
    }

    .dialog-close:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .dialog-body {
      padding: 16px 20px 20px;
    }

    /* ── Dialog Overlay ────────────────────────────────────────────────────── */
    #dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    /* ── Seed Dialog specifics ─────────────────────────────────────────────── */
    #seed-textarea {
      width: 100%;
      height: 180px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      color: #374151;
    }

    #seed-textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    #seed-preview-count {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    #seed-import-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      width: 100%;
      padding: 9px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    #seed-import-btn:hover {
      background: #2563eb;
    }

    /* ── Settings Dialog specifics ─────────────────────────────────────────── */
    .settings-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .size-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .size-toggle {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    .size-toggle:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .size-toggle.active {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8;
    }

    .font-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .font-option {
      padding: 8px 6px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
      text-align: center;
      color: #374151;
      transition: border-color 0.1s;
    }

    .font-option:hover {
      border-color: #9ca3af;
    }

    .font-option.selected {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .settings-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #374151;
    }

    /* Simple toggle switch */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #3b82f6;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* ── Brackets List Dialog specifics ────────────────────────────────────── */
    #bracket-entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .bracket-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .bracket-entry:hover {
      background: #f9fafb;
    }

    .bracket-entry-name {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    .bracket-entry-meta {
      font-size: 11px;
      color: #9ca3af;
    }

    #new-bracket-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 16px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    #new-bracket-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    /* ── Format Popover ────────────────────────────────────────────────────── */
    #format-popover {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 1001;
      padding: 14px 16px;
      width: 240px;
      border: 1px solid #e5e7eb;
    }

    /* CSS arrow pointing down (popover above cell) */
    #format-popover::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid white;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
    }

    /* CSS arrow pointing up (popover below cell) */
    #format-popover.popover-below::after {
      bottom: auto;
      top: -8px;
      border-top: none;
      border-bottom: 8px solid white;
      filter: drop-shadow(0 -2px 2px rgba(0, 0, 0, 0.08));
    }

    .popover-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .popover-section {
      margin-bottom: 12px;
    }

    .popover-section:last-child {
      margin-bottom: 0;
    }

    #bg-color-grid {
      /* inherits .color-grid styles when class is added */
    }

    #settings-bg-color-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    /* auto-contrast — always auto-calculated */

    /* ── Drag and Drop ─────────────────────────────────────────────────── */
    .cell.dragging {
      opacity: 0.4;
    }

    .cell.drag-over {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .cell[draggable="true"] {
      cursor: grab;
    }

    .cell[draggable="true"]:active {
      cursor: grabbing;
    }

    /* ── Polish Transitions ───────────────────────────────────────────────── */
    .cell {
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s, background-color 0.2s;
    }

    .promote-btn {
      opacity: 0;
      transition: opacity 0.2s, background 0.15s;
    }

    .cell:hover .promote-btn {
      opacity: 1;
    }

    .cell-loser {
      transition: opacity 0.4s;
    }

    .dialog {
      transition: opacity 0.15s, transform 0.15s;
    }

    #dialog-overlay {
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <span id="app-name">🌿 Matchvine</span>
    <span
      id="bracket-title"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="Untitled Bracket"
    >Untitled Bracket</span>

    <div class="toolbar-divider"></div>

    <button class="toolbar-btn" id="btn-seed" title="Seed participants">
      📋 Seed
    </button>
    <button class="toolbar-btn disabled" id="btn-shuffle" title="Shuffle participants">
      🔀 Shuffle
    </button>
    <button class="toolbar-btn" id="btn-settings" title="Settings">
      ⚙️ Settings
    </button>
    <button class="toolbar-btn" id="btn-new-toolbar" title="New bracket">
      ✚ New
    </button>

    <div class="toolbar-spacer"></div>

    <button class="toolbar-btn" id="btn-export-png" title="Export as PNG">
      📷 Export PNG
    </button>
    <button class="toolbar-btn" id="btn-brackets" title="My brackets">
      📁 Brackets
    </button>

    <!-- Hidden file input for load -->
    <input type="file" id="load-file-input" accept=".bracket" class="hidden">
  </div>

  <!-- ── Bracket Container ─────────────────────────────────────────────────── -->
  <div id="bracket-container"></div>

  <!-- ── Dialog Overlay ────────────────────────────────────────────────────── -->
  <div id="dialog-overlay" class="hidden"></div>

  <!-- ── Seed Dialog ───────────────────────────────────────────────────────── -->
  <div id="seed-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Seed Participants</span>
      <button class="dialog-close" id="seed-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <textarea
        id="seed-textarea"
        placeholder="Enter one participant per line…"
        spellcheck="false"
      ></textarea>
      <p id="seed-preview-count">0 participants entered</p>
      <button id="seed-import-btn">Import Participants</button>
    </div>
  </div>

  <!-- ── Settings Dialog ───────────────────────────────────────────────────── -->
  <div id="settings-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Settings</span>
      <button class="dialog-close" id="settings-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">

      <div class="settings-section">
        <div class="settings-section-label">Bracket Size</div>
        <div class="size-toggles" id="size-toggles">
          <button class="size-toggle active" data-size="4">4</button>
          <button class="size-toggle" data-size="8">8</button>
          <button class="size-toggle" data-size="16">16</button>
          <button class="size-toggle" data-size="32">32</button>
          <button class="size-toggle" data-size="64">64</button>
          <button class="size-toggle" data-size="128">128</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Font</div>
        <div class="font-picker-grid" id="font-picker-grid">
          <!-- font options injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Background Color</div>
        <div class="color-grid" id="settings-bg-color-grid">
          <!-- color swatches injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Options</div>
        <div class="settings-toggle-row">
          <label class="toggle-label" for="toggle-seed-numbers">Show seed numbers</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-seed-numbers">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; text-align: center;">
        <a href="https://github.com/ttop/matchvine" target="_blank" style="color: #6b7280; font-size: 12px; text-decoration: none;">
          🌿 Matchvine on GitHub
        </a>
      </div>

    </div>
  </div>

  <!-- ── Brackets List Dialog ──────────────────────────────────────────────── -->
  <div id="brackets-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">My Brackets</span>
      <button class="dialog-close" id="brackets-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <div id="bracket-entries">
        <!-- bracket entry items injected by JS -->
      </div>
      <button id="new-bracket-btn">+ New Bracket</button>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="toolbar-btn" id="btn-save" style="flex:1;justify-content:center" title="Save bracket to file">💾 Save to File</button>
        <button class="toolbar-btn" id="btn-load" style="flex:1;justify-content:center" title="Load bracket from file">📂 Load from File</button>
      </div>
    </div>
  </div>

  <!-- ── New Bracket Dialog ───────────────────────────────────────────────── -->
  <div id="new-bracket-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Create New Bracket</span>
      <button class="dialog-close" id="new-bracket-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <div class="settings-section">
        <div class="settings-section-label">Bracket Title</div>
        <input type="text" id="new-bracket-title-input" value="New Bracket" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" />
      </div>
      <div class="settings-section">
        <div class="settings-section-label">Bracket Size</div>
        <div class="size-toggles" id="new-bracket-size-toggles">
          <button class="size-toggle" data-size="4">4</button>
          <button class="size-toggle" data-size="8">8</button>
          <button class="size-toggle active" data-size="16">16</button>
          <button class="size-toggle" data-size="32">32</button>
          <button class="size-toggle" data-size="64">64</button>
          <button class="size-toggle" data-size="128">128</button>
        </div>
      </div>
      <button id="new-bracket-create-btn" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 16px;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.1s;">Create Bracket</button>
    </div>
  </div>

  <!-- ── Format Popover ────────────────────────────────────────────────────── -->
  <div id="format-popover" class="hidden">
    <button id="format-popover-close" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:14px;color:#6b7280;display:flex;align-items:center;justify-content:center;" title="Close">✕</button>
    <div class="popover-section">
      <div class="popover-section-label">Background</div>
      <div class="color-grid" id="bg-color-grid">
        <!-- color swatches injected by JS -->
      </div>
    </div>
  </div>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────

    const BRACKET_SIZES = [4, 8, 16, 32, 64, 128];

    // MS Paint-style organized palette: 5 rows of 8
    const COLOR_PALETTE = [
      // Row 1 - Vivid
      '#ef4444', '#f97316', '#eab308', '#22c55e', '#14b8a6', '#3b82f6', '#8b5cf6', '#ec4899',
      // Row 2 - Medium
      '#f87171', '#fb923c', '#facc15', '#4ade80', '#2dd4bf', '#60a5fa', '#a78bfa', '#f472b6',
      // Row 3 - Pastel
      '#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#99f6e4', '#bfdbfe', '#ddd6fe', '#fbcfe8',
      // Row 4 - Muted/Earth
      '#a16207', '#d2b48c', '#6b7f3a', '#6b8f71', '#64748b', '#4682b4', '#9f7aea', '#d4918f',
      // Row 5 - Neutral
      '#ffffff', '#e5e7eb', '#d1d5db', '#f5f0e8', '#fef9ef', '#d1fae5', '#e8e0f0', '#fce7f3',
    ];

    const TEXT_COLORS = [
      '#1a1a1a',
      '#374151',
      '#6b7280',
      '#ffffff',
      '#1e40af',
      '#991b1b',
      '#166534',
    ];

    const DEFAULT_FONTS = [
      { name: 'Sans-serif',  family: 'sans-serif' },
      { name: 'Serif',       family: 'serif' },
      { name: 'Monospace',   family: 'monospace' },
      { name: 'Cursive',     family: 'cursive' },
    ];

    const GOOGLE_FONTS = [
      'Roboto',
      'Merriweather',
      'Oswald',
      'Poppins',
      'Pacifico',
      'Bangers',
      'Fredoka One',
      'Righteous',
    ];

    const CELL_WIDTH  = 200;
    const CELL_HEIGHT = 56;
    const ROUND_GAP   = 60;
    const CELL_GAP    = 8;
    const CHAMP_WIDTH = 220;
    const TOP_PADDING = 20;
    const LABEL_MARGIN = 40;
    const LEFT_PADDING = 50; // enough room for seed numbers on the left
    const RIGHT_PADDING = 50; // enough room for seed numbers on the right

    // ── State ────────────────────────────────────────────────────────────────

    const state = {
      bracket: null,
    };

    // ── Utility helpers ──────────────────────────────────────────────────────

    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).slice(2, 11);
    }

    // ── Factory functions ─────────────────────────────────────────────────────

    function createBracket(size, title) {
      const totalSlots = 2 * size - 1;
      const slots = [];

      for (let i = 0; i < totalSlots; i++) {
        // Determine which round this flat index belongs to
        let round = 0;
        let offset = 0;
        while (true) {
          const slotsInRound = getSlotsInRound(size, round);
          if (i < offset + slotsInRound) {
            break;
          }
          offset += slotsInRound;
          round++;
        }
        const indexInRound = i - getSlotOffset(size, round);
        slots.push({ round, index: indexInRound, cellId: null });
      }

      const now = new Date().toISOString();
      return {
        id: generateId(),
        title: title || 'My Bracket',
        titleFont: 'sans-serif',
        size,
        backgroundColor: '#ffffff',
        showSeedNumbers: true,
        createdAt: now,
        updatedAt: now,
        cells: {},
        slots,
        zoomState: { focused: false, region: null },
      };
    }

    function createCell(text, bgColor) {
      return {
        id: generateId(),
        text: text || '',
        textColor: getAutoTextColor(bgColor || '#ffffff'),
        bgColor: bgColor || '#ffffff',
        sourceSlot: null,
      };
    }

    // ── Slot indexing math ────────────────────────────────────────────────────

    /** How many slots are in a given round. */
    function getSlotsInRound(size, round) {
      return size >> round; // size / 2^round
    }

    /** Starting flat-array index for the first slot in a given round. */
    function getSlotOffset(size, round) {
      let offset = 0;
      for (let r = 0; r < round; r++) {
        offset += getSlotsInRound(size, r);
      }
      return offset;
    }

    /** Total number of rounds (including the 1-slot champion round). */
    function getTotalRounds(size) {
      return Math.log2(size) + 1;
    }

    /** Flat array index for a slot at a given round and position within that round. */
    function getSlotIndex(size, round, indexInRound) {
      return getSlotOffset(size, round) + indexInRound;
    }

    /**
     * Returns the two flat slot indices from the previous round that feed into
     * this slot.  Returns null for round 0 (no feeders).
     */
    function getMatchupPair(size, round, indexInRound) {
      if (round === 0) return null;
      const prevRound = round - 1;
      const feederA   = indexInRound * 2;
      const feederB   = indexInRound * 2 + 1;
      return [
        getSlotIndex(size, prevRound, feederA),
        getSlotIndex(size, prevRound, feederB),
      ];
    }

    /**
     * Returns the { round, index } of the next slot this one promotes into.
     * Returns null for the champion slot.
     */
    function getNextSlot(size, round, indexInRound) {
      const totalRounds = getTotalRounds(size);
      if (round >= totalRounds - 1) return null; // champion slot
      return {
        round: round + 1,
        index: Math.floor(indexInRound / 2),
      };
    }

    /**
     * Returns true if this slot is in the left half of the bracket.
     * For round 0: left half = first size/2 entries.
     * For later rounds: follows whatever round-0 slots feed into it.
     */
    function isLeftHalf(size, round, indexInRound) {
      if (round === 0) {
        return indexInRound < size / 2;
      }
      // Trace back to round 0
      let r   = round;
      let idx = indexInRound;
      while (r > 0) {
        idx = idx * 2; // left-most feeder path
        r--;
      }
      return idx < size / 2;
    }

    /** Flat index of the champion (final) slot. */
    function getChampionSlotIndex(size) {
      return 2 * size - 2;
    }

    // ── Contrast / colour helpers ─────────────────────────────────────────────

    /** WCAG 2.1 relative luminance for a hex colour string. */
    function getLuminance(hexColor) {
      if (!hexColor || !/^#[0-9a-fA-F]{6}$/.test(hexColor)) return 0;
      const hex = hexColor.replace('#', '');
      const r   = parseInt(hex.substring(0, 2), 16) / 255;
      const g   = parseInt(hex.substring(2, 4), 16) / 255;
      const b   = parseInt(hex.substring(4, 6), 16) / 255;

      const toLinear = c =>
        c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);

      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }

    /** WCAG contrast ratio between two hex colours. */
    function getContrastRatio(color1, color2) {
      const l1 = getLuminance(color1);
      const l2 = getLuminance(color2);
      const lighter = Math.max(l1, l2);
      const darker  = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }

    /**
     * Choose dark or light text colour based on the background.
     * Uses dark text (#1a1a1a) when it achieves >= 4.5 contrast ratio,
     * otherwise falls back to white.
     */
    function getAutoTextColor(bgColor) {
      const darkText = '#1a1a1a';
      const lightText = '#ffffff';
      return getContrastRatio(bgColor, darkText) >= 4.5 ? darkText : lightText;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Layout position calculator ─────────────────────────────────────────

    function calculateLayout(bracket) {
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);
      const positions = [];

      // Build a map keyed by slotIndex for easy lookup
      const posMap = {};

      // Half size for left/right split
      const halfSize = size / 2;
      const roundsPerHalf = Math.log2(halfSize) + 1; // rounds 0..roundsPerHalf-1 in each half

      // Height of round-0 column in one half
      const round0CountPerHalf = halfSize;
      const round0Height = round0CountPerHalf * CELL_HEIGHT + (round0CountPerHalf - 1) * CELL_GAP;

      // Total height: round-0 height + margin for labels
      const totalHeight = round0Height + TOP_PADDING * 2 + LABEL_MARGIN;

      // Total width: left half columns + gap + champion + gap + right half columns
      const leftCols = roundsPerHalf;
      const rightCols = roundsPerHalf;
      const CENTER_GAP = ROUND_GAP;
      const totalWidth = LEFT_PADDING + leftCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP + CENTER_GAP + CHAMP_WIDTH + CENTER_GAP + rightCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP + RIGHT_PADDING;

      // Champion x position: center
      const championX = LEFT_PADDING + leftCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP + CENTER_GAP;

      // --- Place round 0 cells for LEFT half (indices 0..halfSize-1) ---
      for (let i = 0; i < halfSize; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        const y = TOP_PADDING + i * (CELL_HEIGHT + CELL_GAP);
        const x = LEFT_PADDING;
        const pos = {
          slotIndex,
          round: 0,
          indexInRound: i,
          x,
          y,
          isLeftHalf: true,
          isChampion: false,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      // --- Place round 0 cells for RIGHT half (indices halfSize..size-1) ---
      const rightEdgeX = totalWidth - CELL_WIDTH - RIGHT_PADDING;
      for (let i = halfSize; i < size; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        const y = TOP_PADDING + (i - halfSize) * (CELL_HEIGHT + CELL_GAP);
        const x = rightEdgeX;
        const pos = {
          slotIndex,
          round: 0,
          indexInRound: i,
          x,
          y,
          isLeftHalf: false,
          isChampion: false,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      // --- Place rounds 1+ for both halves (not champion) ---
      for (let round = 1; round < totalRounds - 1; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const leftHalf = isLeftHalf(size, round, idx);
          const feeders = getMatchupPair(size, round, idx);
          const feederA = posMap[feeders[0]];
          const feederB = posMap[feeders[1]];
          const y = (feederA.y + feederB.y) / 2;

          let x;
          if (leftHalf) {
            x = LEFT_PADDING + round * (CELL_WIDTH + ROUND_GAP);
          } else {
            // For right half, figure out which "column index from right" this is
            // Right half round 0 is at rightEdgeX. Round 1 is one step left, etc.
            // We need to know which local round within the right half this is.
            // Right half round-0 indices start at halfSize.
            // For round R in right half, local column = R (same as round number, since
            // both halves share the same round numbers)
            x = rightEdgeX - round * (CELL_WIDTH + ROUND_GAP);
          }

          const pos = {
            slotIndex,
            round,
            indexInRound: idx,
            x,
            y,
            isLeftHalf: leftHalf,
            isChampion: false,
          };
          positions.push(pos);
          posMap[slotIndex] = pos;
        }
      }

      // --- Place champion slot ---
      {
        const champRound = totalRounds - 1;
        const slotIndex = getChampionSlotIndex(size);
        const feeders = getMatchupPair(size, champRound, 0);
        const feederA = posMap[feeders[0]];
        const feederB = posMap[feeders[1]];
        const y = (feederA.y + feederB.y) / 2;
        const pos = {
          slotIndex,
          round: champRound,
          indexInRound: 0,
          x: championX,
          y,
          isLeftHalf: false,
          isChampion: true,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      return { positions, posMap, totalWidth, totalHeight, championX, CHAMP_WIDTH };
    }

    // ── Bracket rendering ──────────────────────────────────────────────────

    function renderBracket(bracket) {
      const container = document.getElementById('bracket-container');
      const layout = calculateLayout(bracket);
      const { positions, posMap, totalWidth, totalHeight, championX, CHAMP_WIDTH } = layout;
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);

      container.innerHTML = '';
      // Don't set container size — it stays at viewport size. Inner wrapper holds the bracket.

      // Inner wrapper that holds everything and gets scaled to fit
      const bracketInner = document.createElement('div');
      bracketInner.id = 'bracket-inner';
      bracketInner.style.position = 'relative';
      bracketInner.style.width = totalWidth + 'px';
      bracketInner.style.height = totalHeight + 'px';
      bracketInner.style.transformOrigin = 'top left';
      container.appendChild(bracketInner);

      // SVG for connector lines
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', totalWidth);
      svg.setAttribute('height', totalHeight);
      svg.style.position = 'absolute';
      svg.style.left = '0';
      svg.style.top = '0';
      svg.style.pointerEvents = 'none';
      bracketInner.appendChild(svg);

      // Wrapper for cells
      const cellWrapper = document.createElement('div');
      cellWrapper.style.position = 'absolute';
      cellWrapper.style.left = '0';
      cellWrapper.style.top = '0';
      cellWrapper.style.width = totalWidth + 'px';
      cellWrapper.style.height = totalHeight + 'px';
      bracketInner.appendChild(cellWrapper);

      // -- Collect which cellIds appear in later rounds (for winner/loser styling) --
      const promotedCellIds = new Set();
      for (let round = 1; round < totalRounds; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const slot = bracket.slots[slotIndex];
          if (slot && slot.cellId) {
            promotedCellIds.add(slot.cellId);
          }
        }
      }
      // -- Render cells --
      for (const pos of positions) {
        const slot = bracket.slots[pos.slotIndex];
        const cellEl = document.createElement('div');
        cellEl.className = 'cell';

        const isChamp = pos.isChampion;
        const cellWidth = isChamp ? CHAMP_WIDTH : CELL_WIDTH;

        if (!slot || !slot.cellId) {
          cellEl.classList.add('cell-empty');
        }
        if (isChamp) {
          cellEl.classList.add('cell-champion');
        }

        cellEl.style.left = pos.x + 'px';
        cellEl.style.top = pos.y + 'px';
        cellEl.style.width = cellWidth + 'px';
        cellEl.style.height = CELL_HEIGHT + 'px';
        cellEl.setAttribute('data-slot-index', pos.slotIndex);
        cellEl.setAttribute('data-round', pos.round);
        cellEl.setAttribute('data-index-in-round', pos.indexInRound);

        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          const cell = bracket.cells[slot.cellId];
          cellEl.style.backgroundColor = cell.bgColor || '#ffffff';
          cellEl.style.color = cell.textColor || '#1a1a1a';

          // Check for winner/loser styling in round-0 feeder context
          if (pos.round < totalRounds - 1 && promotedCellIds.has(slot.cellId)) {
            // This cell has been promoted to a later round — check if it won from this slot
            const next = getNextSlot(size, pos.round, pos.indexInRound);
            if (next) {
              const nextSlotIndex = getSlotIndex(size, next.round, next.index);
              const nextSlot = bracket.slots[nextSlotIndex];
              if (nextSlot && nextSlot.cellId === slot.cellId) {
                cellEl.classList.add('cell-winner');
              } else if (nextSlot && nextSlot.cellId && nextSlot.cellId !== slot.cellId) {
                cellEl.classList.add('cell-loser');
              }
            }
          }

          // Display text with line break support
          const textContent = cell.text || '';
          const safeText = escapeHtml(textContent).replace(/\n/g, '<br>');
          if (isChamp) {
            cellEl.innerHTML = '<span style="margin-right:4px">🏆</span>' + safeText;
          } else {
            cellEl.innerHTML = safeText;
          }
        } else {
          // Empty slot
          if (isChamp) {
            cellEl.innerHTML = '🏆';
          } else {
            cellEl.textContent = '?';
          }
        }

        cellWrapper.appendChild(cellEl);
      }

      // -- Draw connector lines --
      const strokeColor = '#9ca3af';
      const strokeWidth = '1.5';

      function svgLine(x1, y1, x2, y2) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', strokeColor);
        line.setAttribute('stroke-width', strokeWidth);
        svg.appendChild(line);
      }

      for (const pos of positions) {
        if (pos.round === 0) continue;

        const feeders = getMatchupPair(size, pos.round, pos.indexInRound);
        if (!feeders) continue;

        const feederA = posMap[feeders[0]];
        const feederB = posMap[feeders[1]];
        if (!feederA || !feederB) continue;

        const cellWidth = pos.isChampion ? CHAMP_WIDTH : CELL_WIDTH;
        const midY = pos.y + CELL_HEIGHT / 2;
        const feederAMidY = feederA.y + CELL_HEIGHT / 2;
        const feederBMidY = feederB.y + CELL_HEIGHT / 2;

        if (pos.isChampion) {
          // Champion: feeders come from both halves
          // Left semi-final: connector from right edge to champion left edge
          const leftFeeder = feederA.isLeftHalf ? feederA : feederB;
          const rightFeeder = feederA.isLeftHalf ? feederB : feederA;

          // Left feeder -> champion
          const ljx = leftFeeder.x + CELL_WIDTH + (pos.x - (leftFeeder.x + CELL_WIDTH)) / 2;
          const leftMidY = leftFeeder.y + CELL_HEIGHT / 2;
          svgLine(leftFeeder.x + CELL_WIDTH, leftMidY, ljx, leftMidY);
          svgLine(ljx, leftMidY, ljx, midY);
          svgLine(ljx, midY, pos.x, midY);

          // Right feeder -> champion
          const rjx = rightFeeder.x - (rightFeeder.x - (pos.x + CHAMP_WIDTH)) / 2;
          const rightMidY = rightFeeder.y + CELL_HEIGHT / 2;
          svgLine(rightFeeder.x, rightMidY, rjx, rightMidY);
          svgLine(rjx, rightMidY, rjx, midY);
          svgLine(rjx, midY, pos.x + CHAMP_WIDTH, midY);

        } else if (pos.isLeftHalf) {
          // Left half: horizontal from right edge of feeders -> vertical -> horizontal to current cell left edge
          const jx = feederA.x + CELL_WIDTH + (pos.x - (feederA.x + CELL_WIDTH)) / 2;
          svgLine(feederA.x + CELL_WIDTH, feederAMidY, jx, feederAMidY);
          svgLine(feederB.x + CELL_WIDTH, feederBMidY, jx, feederBMidY);
          svgLine(jx, feederAMidY, jx, feederBMidY);
          svgLine(jx, midY, pos.x, midY);

        } else {
          // Right half: horizontal from left edge of feeders -> vertical -> horizontal to current cell right edge
          const jx = feederA.x - (feederA.x - (pos.x + CELL_WIDTH)) / 2;
          svgLine(feederA.x, feederAMidY, jx, feederAMidY);
          svgLine(feederB.x, feederBMidY, jx, feederBMidY);
          svgLine(jx, feederAMidY, jx, feederBMidY);
          svgLine(jx, midY, pos.x + CELL_WIDTH, midY);
        }
      }

      // -- Round labels --
      const halfSize = size / 2;
      const roundsPerHalf = Math.log2(halfSize) + 1;
      const labelY = totalHeight - 30;

      function getHalfRoundLabel(round, roundsInHalf) {
        if (round === roundsInHalf - 1) return 'Semis';
        return 'Round ' + (round + 1);
      }

      // Left half labels
      for (let r = 0; r < roundsPerHalf; r++) {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        const x = LEFT_PADDING + r * (CELL_WIDTH + ROUND_GAP);
        labelEl.style.left = x + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CELL_WIDTH + 'px';
        labelEl.textContent = getHalfRoundLabel(r, roundsPerHalf);
        cellWrapper.appendChild(labelEl);
      }

      // Champion label
      {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        labelEl.style.left = championX + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CHAMP_WIDTH + 'px';
        labelEl.textContent = 'Final';
        cellWrapper.appendChild(labelEl);
      }

      // Right half labels (mirrored)
      const rightEdgeX = totalWidth - CELL_WIDTH - RIGHT_PADDING;
      for (let r = 0; r < roundsPerHalf; r++) {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        const x = rightEdgeX - r * (CELL_WIDTH + ROUND_GAP);
        labelEl.style.left = x + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CELL_WIDTH + 'px';
        labelEl.textContent = getHalfRoundLabel(r, roundsPerHalf);
        cellWrapper.appendChild(labelEl);
      }

      // -- Seed numbers --
      if (bracket.showSeedNumbers) {
        for (let i = 0; i < size; i++) {
          const slotIndex = getSlotIndex(size, 0, i);
          const slot = bracket.slots[slotIndex];
          const pos = posMap[slotIndex];
          if (!pos) continue;

          const seedEl = document.createElement('div');
          seedEl.className = 'seed-number';
          seedEl.textContent = '#' + (i + 1);
          seedEl.style.top = (pos.y + CELL_HEIGHT / 2 - 7) + 'px';

          if (pos.isLeftHalf) {
            seedEl.style.left = (pos.x - 26) + 'px';
          } else {
            seedEl.style.left = (pos.x + CELL_WIDTH + 6) + 'px';
          }

          cellWrapper.appendChild(seedEl);
        }
      }

      // -- Bracket title on canvas --
      if (bracket.title) {
        const titleEl = document.createElement('div');
        titleEl.className = 'bracket-title-display';
        titleEl.textContent = bracket.title;
        // Center above the champion area, halfway between top and champion
        const titleWidth = 400;
        const champSlotPos = posMap[getChampionSlotIndex(size)];
        const championY = champSlotPos ? champSlotPos.y : 0;
        titleEl.style.left = (championX + CHAMP_WIDTH / 2 - titleWidth / 2) + 'px';
        titleEl.style.width = titleWidth + 'px';
        titleEl.style.top = (championY / 2 - 25) + 'px';
        titleEl.addEventListener('click', function() {
          // Click title to edit it
          const titleInput = document.getElementById('bracket-title');
          titleInput.focus();
        });
        cellWrapper.appendChild(titleEl);
      }
    }

    // ── Cell Editing State ────────────────────────────────────────────────

    state.editingSlotIndex = null;
    state.beforeEditText   = null;

    // ── autoSizeText ──────────────────────────────────────────────────────

    function autoSizeText(cellDiv) {
      const textEl = cellDiv.querySelector('.cell-text');
      if (!textEl) return;

      const BASE_FONT = 22;
      const MIN_FONT = 11;

      // Reset to measure at base size
      textEl.style.fontSize = BASE_FONT + 'px';
      textEl.style.lineHeight = '1.2';
      textEl.style.padding = '4px 8px';
      textEl.style.overflow = 'hidden';

      // Short text always fits at base size
      const text = (textEl.textContent || '').trim();
      if (text.length <= 3) return;

      // For longer text, check if it actually overflows
      let fontSize = BASE_FONT;
      while (fontSize > MIN_FONT) {
        textEl.style.fontSize = fontSize + 'px';
        if (textEl.scrollHeight <= textEl.clientHeight && textEl.scrollWidth <= textEl.clientWidth) {
          break;
        }
        fontSize--;
      }
    }

    // ── exitEditMode ──────────────────────────────────────────────────────

    function exitEditMode() {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(
        `.cell[data-slot-index="${state.editingSlotIndex}"]`
      );
      if (cellEl) {
        cellEl.classList.remove('cell-editing');
        const textEl = cellEl.querySelector('.cell-text');
        if (textEl) {
          textEl.contentEditable = 'false';
        }
      }

      state.editingSlotIndex = null;
      state.beforeEditText   = null;
    }

    // ── confirmEdit ───────────────────────────────────────────────────────

    function confirmEdit() {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(
        `.cell[data-slot-index="${state.editingSlotIndex}"]`
      );

      if (cellEl) {
        const textEl = cellEl.querySelector('.cell-text');
        if (!textEl) {
          // Cannot find text element — exit edit mode without modifying cell data
          console.log('[Matchvine] confirmEdit: cell-text element not found, skipping data update');
          const slotIdx = state.editingSlotIndex;
          exitEditMode();
          renderBracket(state.bracket);
          return;
        }
        // Extract text, converting <br> back to \n
        let rawHtml = textEl.innerHTML;
        console.log('[Matchvine] confirmEdit raw innerHTML:', JSON.stringify(rawHtml));
        rawHtml = rawHtml.replace(/<br\s*\/?>/gi, '\n');
        // Strip any other HTML tags
        const tmp = document.createElement('div');
        tmp.innerHTML = rawHtml;
        const newText = (tmp.textContent || '').replace(/^[\s\n\r]+|[\s\n\r]+$/g, '');
        console.log('[Matchvine] confirmEdit extracted text:', JSON.stringify(newText));

        const bracket = state.bracket;
        const slot = bracket.slots[state.editingSlotIndex];
        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          if (newText === '') {
            // Empty text — remove the cell entirely
            delete bracket.cells[slot.cellId];
            slot.cellId = null;
          } else {
            bracket.cells[slot.cellId].text = newText;
          }
        }
      }

      const slotIdx = state.editingSlotIndex;
      exitEditMode();
      renderBracket(state.bracket);

      // Re-apply auto-sizing to the confirmed cell
      const updatedCellEl = document.getElementById('bracket-container').querySelector(
        `.cell[data-slot-index="${slotIdx}"]`
      );
      if (updatedCellEl) {
        autoSizeText(updatedCellEl);
      }
    }

    // ── enterEditMode ─────────────────────────────────────────────────────

    function enterEditMode(slotIndex) {
      const bracket = state.bracket;
      const slot = bracket.slots[slotIndex];
      const wasEmpty = !slot.cellId;

      // If empty slot, create a cell in the data model but DON'T re-render.
      // Instead, modify the existing DOM cell directly.
      if (wasEmpty) {
        const color = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
        const newCell = createCell('', color);
        bracket.cells[newCell.id] = newCell;
        slot.cellId = newCell.id;
      }

      state.editingSlotIndex = slotIndex;
      const cell = bracket.cells[slot.cellId];
      state.beforeEditText = cell ? cell.text : '';

      // Directly modify the existing DOM cell (no re-render!)
      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(`.cell[data-slot-index="${slotIndex}"]`);
      if (!cellEl) return;

      // Apply color directly to DOM
      if (wasEmpty) {
        cellEl.style.backgroundColor = cell.bgColor;
        cellEl.style.color = cell.textColor;
        cellEl.classList.remove('cell-empty');
      }

      // Get or create the text span
      let textEl = cellEl.querySelector('.cell-text');
      if (!textEl) {
        textEl = document.createElement('span');
        textEl.className = 'cell-text';
        cellEl.innerHTML = '';
        cellEl.appendChild(textEl);
      }

      // Clear placeholder text
      if (wasEmpty || textEl.textContent === '?') {
        textEl.textContent = '';
      }

      cellEl.classList.add('cell-editing');
      textEl.contentEditable = 'true';
      textEl.spellcheck = false;
      textEl.setAttribute('spellcheck', 'false');

      // Keydown handler for Enter/Escape
      textEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          confirmEdit();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          e.stopPropagation();
          const bracket = state.bracket;
          const slot = bracket.slots[state.editingSlotIndex];
          if (slot && slot.cellId && bracket.cells[slot.cellId]) {
            if (!state.beforeEditText) {
              delete bracket.cells[slot.cellId];
              slot.cellId = null;
            } else {
              bracket.cells[slot.cellId].text = state.beforeEditText;
            }
          }
          exitEditMode();
          renderBracket(bracket);
        }
      }, true);

      // Focus immediately — no setTimeout needed since we didn't re-render
      textEl.focus();
    }

    // ── Patch renderBracket to use .cell-text spans and call autoSizeText ─

    const _origRenderBracket = renderBracket;
    renderBracket = function(bracket) {
      _origRenderBracket(bracket);

      // Wrap all cell text in .cell-text spans and apply auto-sizing
      const container = document.getElementById('bracket-container');
      container.querySelectorAll('.cell').forEach(cellEl => {
        // If no .cell-text span yet, wrap existing innerHTML
        if (!cellEl.querySelector('.cell-text')) {
          const existingHtml = cellEl.innerHTML;
          cellEl.innerHTML = '';
          const textEl = document.createElement('span');
          textEl.className = 'cell-text';
          textEl.innerHTML = existingHtml;
          cellEl.appendChild(textEl);
        }
        autoSizeText(cellEl);
      });
    };

    // ── Event: click on bracket container (edit delegation) ───────────────

    document.getElementById('bracket-container').addEventListener('click', function(e) {
      const cellEl = e.target.closest('.cell');

      if (!cellEl) {
        // Clicked on empty space — confirm any active edit
        if (state.editingSlotIndex !== null) {
          confirmEdit();
        }
        return;
      }

      // Ignore clicks on format icon, promote button, or demote button
      if (e.target.closest('.format-icon') || e.target.closest('.promote-btn') || e.target.closest('.demote-btn')) {
        return;
      }

      const slotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);
      const round = parseInt(cellEl.getAttribute('data-round'), 10);
      const slot = state.bracket.slots[slotIndex];

      // Only allow editing in round 0. Later rounds are filled via promote only.
      if (round > 0) {
        return;
      }

      if (state.editingSlotIndex !== null && state.editingSlotIndex !== slotIndex) {
        // Clicking a different cell: confirm current edit first
        confirmEdit();
      }

      if (state.editingSlotIndex !== slotIndex) {
        enterEditMode(slotIndex);
      }
    });

    // ── Event: keydown for editing (Escape only — Enter is handled on textEl in capture phase) ─

    // Escape and Enter for editing are handled by the textEl capture-phase handler
    // in enterEditMode(). No document-level keydown handler needed for editing.

    // ── Event: click outside to confirm ──────────────────────────────────

    document.addEventListener('click', function(e) {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      // If click is outside the bracket container entirely, confirm
      if (!container.contains(e.target)) {
        confirmEdit();
      }
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 5: Color Formatting Popover ─────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    state.formattingSlotIndex = null;

    // Patch renderBracket to add format icons, promote/demote buttons
    const _renderWithText = renderBracket;
    renderBracket = function(bracket) {
      _renderWithText(bracket);

      const container = document.getElementById('bracket-container');
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);

      container.querySelectorAll('.cell').forEach(cellEl => {
        const slotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);
        const round = parseInt(cellEl.getAttribute('data-round'), 10);
        const indexInRound = parseInt(cellEl.getAttribute('data-index-in-round'), 10);
        const slot = bracket.slots[slotIndex];

        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          // ── Format icon ──
          const formatIcon = document.createElement('span');
          formatIcon.className = 'format-icon';
          formatIcon.textContent = '🎨';
          cellEl.appendChild(formatIcon);

          // ── Promote buttons ──
          if (round < totalRounds - 1) {
            const next = getNextSlot(size, round, indexInRound);
            if (next) {
              const nextSlotIndex = getSlotIndex(size, next.round, next.index);
              const nextSlot = bracket.slots[nextSlotIndex];

              // Show promote button if THIS cell is filled and next-round slot is empty
              // (works for normal matchups AND byes where opponent is empty)
              if (!nextSlot || !nextSlot.cellId) {
                const promoteBtn = document.createElement('div');
                promoteBtn.className = 'promote-btn';
                promoteBtn.setAttribute('data-action', 'promote');
                promoteBtn.setAttribute('data-slot-index', slotIndex);

                const leftHalf = isLeftHalf(size, round, indexInRound);
                if (leftHalf) {
                  promoteBtn.textContent = '›';
                  promoteBtn.style.right = '-13px';
                  promoteBtn.style.top = (CELL_HEIGHT / 2 - 13) + 'px';
                } else {
                  promoteBtn.textContent = '‹';
                  promoteBtn.style.left = '-13px';
                  promoteBtn.style.top = (CELL_HEIGHT / 2 - 13) + 'px';
                }

                cellEl.style.overflow = 'visible';
                cellEl.appendChild(promoteBtn);
              }
            }
          }

          // ── Demote button for promoted cells (round > 0) ──
          if (round > 0) {
            const demoteBtn = document.createElement('div');
            demoteBtn.className = 'demote-btn';
            demoteBtn.setAttribute('data-action', 'demote');
            demoteBtn.setAttribute('data-slot-index', slotIndex);
            demoteBtn.textContent = '×';
            cellEl.style.overflow = 'visible';
            cellEl.appendChild(demoteBtn);
          }

          // ── Draggable for first-round cells (pre-tournament) ──
          if (round === 0 && !hasTournamentStarted(bracket)) {
            cellEl.setAttribute('draggable', 'true');
          }
        }
      });
    };

    // ── Populate and show format popover ──

    function showFormatPopover(slotIndex) {
      const bracket = state.bracket;
      const slot = bracket.slots[slotIndex];
      if (!slot || !slot.cellId) return;
      const cell = bracket.cells[slot.cellId];
      if (!cell) return;

      state.formattingSlotIndex = slotIndex;

      const popover = document.getElementById('format-popover');
      const bgGrid = document.getElementById('bg-color-grid');

      // Populate background color grid
      bgGrid.innerHTML = '';
      COLOR_PALETTE.forEach(color => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = color;
        swatch.setAttribute('data-color', color);
        swatch.setAttribute('data-type', 'bg');
        if (cell.bgColor === color) swatch.classList.add('selected');
        bgGrid.appendChild(swatch);
      });

      // Position popover relative to the cell using fixed/screen coordinates
      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(`.cell[data-slot-index="${slotIndex}"]`);
      if (!cellEl) return;

      const cellRect = cellEl.getBoundingClientRect();

      const popoverWidth = 240;
      let left = cellRect.left + (cellRect.width / 2) - (popoverWidth / 2);

      popover.classList.remove('hidden');

      // Remove any previous arrow class
      popover.classList.remove('popover-below');

      const popoverHeight = popover.offsetHeight;
      const GAP = 8;

      let showBelow = false;
      let top;

      // If not enough room above, show below instead
      if (cellRect.top - popoverHeight - GAP < 4) {
        showBelow = true;
        top = cellRect.bottom + GAP;
        popover.classList.add('popover-below');
      } else {
        top = cellRect.top - popoverHeight - GAP;
      }

      if (left < 4) left = 4;
      if (left + popoverWidth > window.innerWidth - 4) left = window.innerWidth - popoverWidth - 4;

      popover.style.left = left + 'px';
      popover.style.top = top + 'px';
    }

    function hideFormatPopover() {
      state.formattingSlotIndex = null;
      document.getElementById('format-popover').classList.add('hidden');
    }

    document.getElementById('format-popover-close').addEventListener('click', function(e) {
      e.stopPropagation();
      hideFormatPopover();
    });

    // ── Format popover event handlers ──

    document.getElementById('bracket-container').addEventListener('click', function(e) {
      const formatIcon = e.target.closest('.format-icon');
      if (formatIcon) {
        e.stopPropagation();
        const cellEl = formatIcon.closest('.cell');
        if (!cellEl) return;
        const slotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);

        if (state.formattingSlotIndex === slotIndex) {
          hideFormatPopover();
        } else {
          if (state.editingSlotIndex !== null) confirmEdit();
          showFormatPopover(slotIndex);
        }
        return;
      }
    });

    // Click on bg/text swatch in popover
    document.getElementById('format-popover').addEventListener('click', function(e) {
      e.stopPropagation();
      const swatch = e.target.closest('.color-swatch');
      if (!swatch) return;

      const bracket = state.bracket;
      if (state.formattingSlotIndex === null) return;
      const slot = bracket.slots[state.formattingSlotIndex];
      if (!slot || !slot.cellId) return;
      const cell = bracket.cells[slot.cellId];
      if (!cell) return;

      const color = swatch.getAttribute('data-color');
      const type = swatch.getAttribute('data-type');

      if (type === 'bg') {
        cell.bgColor = color;
        cell.textColor = getAutoTextColor(color);
      }

      const savedSlot = state.formattingSlotIndex;
      renderBracket(bracket);
      showFormatPopover(savedSlot);
    });

    // Dismiss popover on click outside
    document.addEventListener('click', function(e) {
      if (state.formattingSlotIndex === null) return;
      const popover = document.getElementById('format-popover');
      if (popover.contains(e.target)) return;
      if (e.target.closest('.format-icon')) return;
      hideFormatPopover();
    });

    // Dismiss popover on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && state.formattingSlotIndex !== null) {
        hideFormatPopover();
      }
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 6: Promote and Demote ───────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    function hasTournamentStarted(bracket) {
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);
      for (let round = 1; round < totalRounds; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const slot = bracket.slots[slotIndex];
          if (slot && slot.cellId) return true;
        }
      }
      return false;
    }

    // Promote handler (delegation)
    document.getElementById('bracket-container').addEventListener('click', function(e) {
      const promoteBtn = e.target.closest('.promote-btn');
      if (!promoteBtn) return;
      e.stopPropagation();

      const bracket = state.bracket;
      const slotIndex = parseInt(promoteBtn.getAttribute('data-slot-index'), 10);
      const slot = bracket.slots[slotIndex];
      if (!slot || !slot.cellId) return;

      const round = slot.round;
      const indexInRound = slot.index;
      const next = getNextSlot(bracket.size, round, indexInRound);
      if (!next) return;

      const nextSlotIndex = getSlotIndex(bracket.size, next.round, next.index);
      const nextSlot = bracket.slots[nextSlotIndex];
      if (nextSlot.cellId) return; // already occupied

      // Allow bye promotion — no requirement that both feeders are filled

      nextSlot.cellId = slot.cellId;
      renderBracket(bracket);
    });

    // Demote handler (delegation)
    document.getElementById('bracket-container').addEventListener('click', function(e) {
      const demoteBtn = e.target.closest('.demote-btn');
      if (!demoteBtn) return;
      e.stopPropagation();

      const bracket = state.bracket;
      const slotIndex = parseInt(demoteBtn.getAttribute('data-slot-index'), 10);
      const slot = bracket.slots[slotIndex];
      if (!slot) return;

      const cellId = slot.cellId;
      // Clear this slot
      slot.cellId = null;

      // Also clear any downstream (higher-round) slots that have this same cellId,
      // since the promotion chain is now broken
      if (cellId) {
        const round = slot.round;
        const totalRounds = getTotalRounds(bracket.size);
        for (let r = round + 1; r < totalRounds; r++) {
          const slotsInRound = getSlotsInRound(bracket.size, r);
          for (let idx = 0; idx < slotsInRound; idx++) {
            const si = getSlotIndex(bracket.size, r, idx);
            if (bracket.slots[si] && bracket.slots[si].cellId === cellId) {
              bracket.slots[si].cellId = null;
            }
          }
        }
      }

      renderBracket(bracket);
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 7: Drag and Drop (Pre-Tournament) ──────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    let dragSourceSlotIndex = null;

    document.getElementById('bracket-container').addEventListener('dragstart', function(e) {
      const cellEl = e.target.closest('.cell');
      if (!cellEl || !cellEl.hasAttribute('draggable')) return;

      dragSourceSlotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);
      cellEl.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(dragSourceSlotIndex));
    });

    document.getElementById('bracket-container').addEventListener('dragend', function(e) {
      const cellEl = e.target.closest('.cell');
      if (cellEl) cellEl.classList.remove('dragging');
      dragSourceSlotIndex = null;

      // Remove all drag-over highlights
      document.querySelectorAll('.cell.drag-over').forEach(el => el.classList.remove('drag-over'));
    });

    document.getElementById('bracket-container').addEventListener('dragover', function(e) {
      if (dragSourceSlotIndex === null) return;

      const cellEl = e.target.closest('.cell');
      if (!cellEl) return;

      const round = parseInt(cellEl.getAttribute('data-round'), 10);
      if (round !== 0) return;

      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cellEl.classList.add('drag-over');
    });

    document.getElementById('bracket-container').addEventListener('dragleave', function(e) {
      const cellEl = e.target.closest('.cell');
      if (cellEl) cellEl.classList.remove('drag-over');
    });

    document.getElementById('bracket-container').addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragSourceSlotIndex === null) return;

      const cellEl = e.target.closest('.cell');
      if (!cellEl) return;

      const targetSlotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);
      const targetRound = parseInt(cellEl.getAttribute('data-round'), 10);
      if (targetRound !== 0) return;
      if (targetSlotIndex === dragSourceSlotIndex) return;

      const bracket = state.bracket;
      const sourceSlot = bracket.slots[dragSourceSlotIndex];
      const targetSlot = bracket.slots[targetSlotIndex];

      if (!sourceSlot) return;

      // Swap or move
      const sourceCellId = sourceSlot.cellId;
      const targetCellId = targetSlot.cellId;

      sourceSlot.cellId = targetCellId;
      targetSlot.cellId = sourceCellId;

      // Update sourceSlot fields on the cells
      if (sourceCellId && bracket.cells[sourceCellId]) {
        bracket.cells[sourceCellId].sourceSlot = targetSlotIndex;
      }
      if (targetCellId && bracket.cells[targetCellId]) {
        bracket.cells[targetCellId].sourceSlot = dragSourceSlotIndex;
      }

      dragSourceSlotIndex = null;
      renderBracket(bracket);
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 8: Toolbar Title Editing + Settings Dialog ────────────────
    // ══════════════════════════════════════════════════════════════════════

    // ── Inline title editing ──

    const bracketTitleEl = document.getElementById('bracket-title');
    let titleBeforeEdit = '';

    bracketTitleEl.addEventListener('focus', function() {
      titleBeforeEdit = this.textContent;
    });

    bracketTitleEl.addEventListener('blur', function() {
      const newTitle = this.textContent.trim();
      if (newTitle && newTitle !== titleBeforeEdit) {
        state.bracket.title = newTitle;
        state.bracket.updatedAt = new Date().toISOString();
      } else if (!newTitle) {
        this.textContent = titleBeforeEdit;
      }
    });

    bracketTitleEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        this.blur();
      } else if (e.key === 'Escape') {
        this.textContent = titleBeforeEdit;
        this.blur();
      }
    });

    // ── Dialog helpers ──

    function showDialog(dialogId) {
      document.getElementById(dialogId).classList.remove('hidden');
      document.getElementById('dialog-overlay').classList.remove('hidden');
    }

    function hideDialog(dialogId) {
      document.getElementById(dialogId).classList.add('hidden');
      document.getElementById('dialog-overlay').classList.add('hidden');
    }

    function hideAllDialogs() {
      ['settings-dialog', 'seed-dialog', 'brackets-dialog', 'new-bracket-dialog'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById('dialog-overlay').classList.add('hidden');
    }

    // ── Settings dialog ──

    const BACKGROUND_COLORS = [
      '#ffffff', '#faf8f5', '#f1f5f9', '#f5f5f4', '#eff6ff',
      '#f0fdf4', '#fefce8', '#fdf2f8', '#faf5ff', '#fef3c7',
    ];

    document.getElementById('btn-settings').addEventListener('click', function() {
      openSettingsDialog();
    });

    function openSettingsDialog() {
      const bracket = state.bracket;

      // Highlight current size
      document.querySelectorAll('#size-toggles .size-toggle').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.getAttribute('data-size'), 10) === bracket.size);
      });

      // Populate background color grid
      const bgGrid = document.getElementById('settings-bg-color-grid');
      bgGrid.innerHTML = '';
      BACKGROUND_COLORS.forEach(color => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = color;
        swatch.setAttribute('data-color', color);
        if (bracket.backgroundColor === color) swatch.classList.add('selected');
        bgGrid.appendChild(swatch);
      });

      // Seed numbers toggle
      document.getElementById('toggle-seed-numbers').checked = bracket.showSeedNumbers;

      showDialog('settings-dialog');
    }

    // Settings close button
    document.getElementById('settings-dialog-close').addEventListener('click', function() {
      hideDialog('settings-dialog');
    });

    // Close on overlay click
    document.getElementById('dialog-overlay').addEventListener('click', function() {
      hideAllDialogs();
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        hideAllDialogs();
      }
    });

    // ── Bracket size selection ──

    document.getElementById('size-toggles').addEventListener('click', function(e) {
      const btn = e.target.closest('.size-toggle');
      if (!btn) return;

      const newSize = parseInt(btn.getAttribute('data-size'), 10);
      const bracket = state.bracket;
      if (newSize === bracket.size) return;

      const oldSize = bracket.size;
      const hasData = Object.keys(bracket.cells).length > 0;

      if (hasData && newSize < oldSize) {
        // Decreasing: warn that cells beyond the new size will be lost
        if (!confirm(`Decreasing from ${oldSize} to ${newSize} will remove entries beyond slot ${newSize}. Continue?`)) return;
      }

      // Collect round-0 cell data from old bracket
      const oldRound0Cells = [];
      for (let i = 0; i < oldSize; i++) {
        const slotIndex = getSlotIndex(oldSize, 0, i);
        const slot = bracket.slots[slotIndex];
        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          oldRound0Cells.push({ index: i, cellId: slot.cellId, cell: bracket.cells[slot.cellId] });
        }
      }

      const newBracket = createBracket(newSize, bracket.title);
      newBracket.titleFont = bracket.titleFont;
      newBracket.backgroundColor = bracket.backgroundColor;
      newBracket.showSeedNumbers = bracket.showSeedNumbers;

      // Copy round-0 cells that fit within the new size
      for (const entry of oldRound0Cells) {
        if (entry.index < newSize) {
          const newSlotIndex = getSlotIndex(newSize, 0, entry.index);
          newBracket.cells[entry.cellId] = entry.cell;
          newBracket.slots[newSlotIndex].cellId = entry.cellId;

      }

        b.classList.toggle('active', parseInt(b.getAttribute('data-size'), 10) === newSize);

    const loadedGoogleFonts = new Set();

    function loadGoogleFont(fontName) {
      if (loadedGoogleFonts.has(fontName)) {
        // Even if we added the stylesheet before, wait for the font to actually be available
        return document.fonts.load(`500 16px "${fontName}"`).then(() => {}).catch(() => {});
      }

      const encoded = fontName.replace(/\s+/g, '+');
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encoded}:wght@400;500;600;700&display=swap`;
      document.head.appendChild(link);
      loadedGoogleFonts.add(fontName);

      // Wait for the specific font to load, not just document.fonts.ready
      return document.fonts.load(`500 16px "${fontName}"`).then(() => {}).catch(() => {
        // Fallback: wait for all fonts to be ready
        return document.fonts.ready;
      });
    }

    function isGoogleFont(fontFamily) {
      return GOOGLE_FONTS.includes(fontFamily);
    }

    function isSystemFont(fontFamily) {
      return DEFAULT_FONTS.some(f => f.family === fontFamily);
    }

    function applyFont(bracket) {
      const font = bracket.titleFont || 'sans-serif';
      const container = document.getElementById('bracket-container');
      const titleEl = document.getElementById('bracket-title');

      // System/generic fonts should not be quoted
      if (isSystemFont(font)) {
        container.style.fontFamily = `${font}`;
        titleEl.style.fontFamily = `${font}`;
      } else {
        container.style.fontFamily = `"${font}", sans-serif`;
        titleEl.style.fontFamily = `"${font}", sans-serif`;
      }
    }

    function populateFontPicker() {
      const grid = document.getElementById('font-picker-grid');
      grid.innerHTML = '';

      const currentFont = state.bracket.titleFont || 'sans-serif';

      // System fonts
      DEFAULT_FONTS.forEach(font => {
        const card = document.createElement('div');
        card.className = 'font-option';
        card.setAttribute('data-font-family', font.family);
        card.setAttribute('data-font-type', 'system');
        card.style.fontFamily = font.family;
        if (currentFont === font.family) card.classList.add('selected');

        card.innerHTML = `<div style="font-size:12px;font-weight:600;margin-bottom:2px">${escapeHtml(font.name)}</div><div style="font-size:10px;opacity:0.7">The quick brown fox</div>`;
        grid.appendChild(card);
      });

      // Google fonts
      GOOGLE_FONTS.forEach(fontName => {
        const card = document.createElement('div');
        card.className = 'font-option';
        card.setAttribute('data-font-family', fontName);
        card.setAttribute('data-font-type', 'google');

        card.innerHTML = `<div style="font-size:12px;font-weight:600;margin-bottom:2px">${escapeHtml(fontName)}</div><div class="font-preview" style="font-size:10px;opacity:0.7">The quick brown fox</div>`;
        grid.appendChild(card);
      });

      // Lazy-load Google Font previews with IntersectionObserver
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const card = entry.target;
            const fontName = card.getAttribute('data-font-family');
            const fontType = card.getAttribute('data-font-type');
            if (fontType === 'google') {
              loadGoogleFont(fontName).then(() => {
                card.style.fontFamily = `"${fontName}", sans-serif`;
              });
            }
            observer.unobserve(card);
          }
        });
      }, { root: grid.closest('.dialog-body'), threshold: 0.1 });

      grid.querySelectorAll('.font-option[data-font-type="google"]').forEach(card => {
        observer.observe(card);
      });
    }

    // ── Task 11: Shuffle ──────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    function shuffleFirstRound(bracket) {
      const { size } = bracket;
      // Collect all first-round cellIds
      const cellIds = [];
      for (let i = 0; i < size; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        cellIds.push(bracket.slots[slotIndex].cellId);
      }

      // Fisher-Yates shuffle
      for (let i = cellIds.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cellIds[i], cellIds[j]] = [cellIds[j], cellIds[i]];
      }

      // Reassign
      for (let i = 0; i < size; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        bracket.slots[slotIndex].cellId = cellIds[i];
        if (cellIds[i] && bracket.cells[cellIds[i]]) {
          bracket.cells[cellIds[i]].sourceSlot = slotIndex;
        }
      }

      bracket.updatedAt = new Date().toISOString();
    }
