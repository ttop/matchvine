    const STORAGE_INDEX_KEY = 'matchvine_index';
    const STORAGE_BRACKET_PREFIX = 'matchvine_bracket_';

    function saveBracket(bracket) {
      if (!bracket) return;
      bracket.updatedAt = new Date().toISOString();
      const key = STORAGE_BRACKET_PREFIX + bracket.id;
      try {
        localStorage.setItem(key, JSON.stringify(bracket));
      } catch (e) {
        console.warn('Failed to save bracket to localStorage', e);
      }
      // Update index
      let index = loadBracketIndex();
      const existing = index.findIndex(entry => entry.id === bracket.id);
      const meta = { id: bracket.id, title: bracket.title, size: bracket.size, updatedAt: bracket.updatedAt };
      if (existing >= 0) {
        index[existing] = meta;
      } else {
        index.push(meta);
      }
      try {
        localStorage.setItem(STORAGE_INDEX_KEY, JSON.stringify(index));
      } catch (e) {
        console.warn('Failed to save bracket index', e);
      }
    }

    function loadBracketIndex() {
      try {
        const raw = localStorage.getItem(STORAGE_INDEX_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return [];
    }

    function loadBracket(id) {
      try {
        const raw = localStorage.getItem(STORAGE_BRACKET_PREFIX + id);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return null;
    }

    function deleteBracketFromStorage(id) {
      try {
        localStorage.removeItem(STORAGE_BRACKET_PREFIX + id);
      } catch (e) {}
      let index = loadBracketIndex();
      index = index.filter(entry => entry.id !== id);
      try {
        localStorage.setItem(STORAGE_INDEX_KEY, JSON.stringify(index));
      } catch (e) {}
    }

    function formatRelativeTime(isoString) {
      if (!isoString) return '';
      const now = Date.now();
      const then = new Date(isoString).getTime();
      const diffMs = now - then;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffSec < 10) return 'just now';
      if (diffSec < 60) return diffSec + ' sec ago';
      if (diffMin < 60) return diffMin + ' min ago';
      if (diffHr < 24) return diffHr + ' hr ago';
      if (diffDay === 1) return 'yesterday';
      if (diffDay < 7) return diffDay + ' days ago';

      const d = new Date(isoString);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate();
    }

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 14: PNG Export ─────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    function renderBracketToCanvas(bracket) {
      const layout = calculateLayout(bracket);
      const { positions, posMap, totalWidth, totalHeight } = layout;
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);
      const halfSize = size / 2;
      const roundsPerHalf = Math.log2(halfSize) + 1;

      const PADDING = 40;
      const TITLE_HEIGHT = 50;
      const canvasWidth = totalWidth + PADDING * 2;
      const canvasHeight = totalHeight + PADDING * 2 + TITLE_HEIGHT;

      const canvas = document.createElement('canvas');
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = bracket.backgroundColor || '#ffffff';
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      const ox = PADDING; // offset x
      const oy = PADDING + TITLE_HEIGHT; // offset y

      // Title
      const fontFamily = bracket.titleFont || 'sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#111827';
      ctx.font = `600 22px "${fontFamily}", sans-serif`;
      ctx.fillText(bracket.title || 'Untitled Bracket', canvasWidth / 2, PADDING + TITLE_HEIGHT / 2 - 5);

      // Collect promoted cell IDs for winner/loser styling
      const promotedCellIds = new Set();
      for (let round = 1; round < totalRounds; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const slot = bracket.slots[slotIndex];
          if (slot && slot.cellId) promotedCellIds.add(slot.cellId);
        }
      }

      // Helper: draw rounded rect
      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      // Draw connector lines
      ctx.strokeStyle = '#9ca3af';
      ctx.lineWidth = 1.5;

      for (const pos of positions) {
        if (pos.round === 0) continue;
        const feeders = getMatchupPair(size, pos.round, pos.indexInRound);
        if (!feeders) continue;
        const feederA = posMap[feeders[0]];
        const feederB = posMap[feeders[1]];
        if (!feederA || !feederB) continue;

        const cellWidth = pos.isChampion ? CHAMP_WIDTH : CELL_WIDTH;
        const midY = oy + pos.y + CELL_HEIGHT / 2;
        const feederAMidY = oy + feederA.y + CELL_HEIGHT / 2;
        const feederBMidY = oy + feederB.y + CELL_HEIGHT / 2;

        ctx.beginPath();
        if (pos.isChampion) {
          const leftFeeder = feederA.isLeftHalf ? feederA : feederB;
          const rightFeeder = feederA.isLeftHalf ? feederB : feederA;
          const ljx = ox + leftFeeder.x + CELL_WIDTH + (pos.x - (leftFeeder.x + CELL_WIDTH)) / 2;
          const leftMidY = oy + leftFeeder.y + CELL_HEIGHT / 2;
          ctx.moveTo(ox + leftFeeder.x + CELL_WIDTH, leftMidY);
          ctx.lineTo(ljx, leftMidY);
          ctx.lineTo(ljx, midY);
          ctx.lineTo(ox + pos.x, midY);

          const rjx = ox + rightFeeder.x - (rightFeeder.x - (pos.x + CHAMP_WIDTH)) / 2;
          const rightMidY = oy + rightFeeder.y + CELL_HEIGHT / 2;
          ctx.moveTo(ox + rightFeeder.x, rightMidY);
          ctx.lineTo(rjx, rightMidY);
          ctx.lineTo(rjx, midY);
          ctx.lineTo(ox + pos.x + CHAMP_WIDTH, midY);
        } else if (pos.isLeftHalf) {
          const jx = ox + feederA.x + CELL_WIDTH + (pos.x - (feederA.x + CELL_WIDTH)) / 2;
          ctx.moveTo(ox + feederA.x + CELL_WIDTH, feederAMidY);
          ctx.lineTo(jx, feederAMidY);
          ctx.moveTo(ox + feederB.x + CELL_WIDTH, feederBMidY);
          ctx.lineTo(jx, feederBMidY);
          ctx.moveTo(jx, feederAMidY);
          ctx.lineTo(jx, feederBMidY);
          ctx.moveTo(jx, midY);
          ctx.lineTo(ox + pos.x, midY);
        } else {
          const jx = ox + feederA.x - (feederA.x - (pos.x + CELL_WIDTH)) / 2;
          ctx.moveTo(ox + feederA.x, feederAMidY);
          ctx.lineTo(jx, feederAMidY);
          ctx.moveTo(ox + feederB.x, feederBMidY);
          ctx.lineTo(jx, feederBMidY);
          ctx.moveTo(jx, feederAMidY);
          ctx.lineTo(jx, feederBMidY);
          ctx.moveTo(jx, midY);
          ctx.lineTo(ox + pos.x + CELL_WIDTH, midY);
        }
        ctx.stroke();
      }

      // Draw cells
      for (const pos of positions) {
        const slot = bracket.slots[pos.slotIndex];
        const isChamp = pos.isChampion;
        const cellWidth = isChamp ? CHAMP_WIDTH : CELL_WIDTH;
        const cx = ox + pos.x;
        const cy = oy + pos.y;

        // Determine styling
        let bgColor = '#f3f4f6';
        let textColor = '#9ca3af';
        let borderColor = '#d1d5db';
        let borderWidth = 1.5;
        let text = '?';
        let isLoser = false;

        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          const cell = bracket.cells[slot.cellId];
          bgColor = cell.bgColor || '#ffffff';
          textColor = cell.textColor || '#1a1a1a';
          text = cell.text || '';

          // Winner/loser
          if (pos.round < totalRounds - 1 && promotedCellIds.has(slot.cellId)) {
            const next = getNextSlot(size, pos.round, pos.indexInRound);
            if (next) {
              const nextSlotIndex = getSlotIndex(size, next.round, next.index);
              const nextSlot = bracket.slots[nextSlotIndex];
              if (nextSlot && nextSlot.cellId === slot.cellId) {
                borderColor = '#22c55e';
                borderWidth = 2;
              } else if (nextSlot && nextSlot.cellId && nextSlot.cellId !== slot.cellId) {
                isLoser = true;
              }
            }
          }
        }

        if (isChamp) {
          borderColor = '#f59e0b';
          borderWidth = 2.5;
        }

        // Draw rounded rect
        ctx.globalAlpha = isLoser ? 0.5 : 1;
        roundedRect(cx, cy, cellWidth, CELL_HEIGHT, 8);
        ctx.fillStyle = bgColor;
        ctx.fill();
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = borderWidth;
        ctx.stroke();

        // Draw text
        ctx.fillStyle = textColor;
        const displayText = isChamp && text ? '\u{1F3C6} ' + text : (isChamp ? '\u{1F3C6}' : text);
        // Auto-size font
        let fontSize = 14;
        ctx.font = `500 ${fontSize}px "${fontFamily}", sans-serif`;
        while (fontSize > 9 && ctx.measureText(displayText).width > cellWidth - 16) {
          fontSize--;
          ctx.font = `500 ${fontSize}px "${fontFamily}", sans-serif`;
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(displayText, cx + cellWidth / 2, cy + CELL_HEIGHT / 2, cellWidth - 8);

        ctx.globalAlpha = 1;
      }

      // Round labels
      const labelY = oy + totalHeight - 30;
      ctx.fillStyle = '#9ca3af';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      function getHalfRoundLabel(round, roundsInHalf) {
        if (round === roundsInHalf - 1) return 'Semis';
        return 'Round ' + (round + 1);
      }

      for (let r = 0; r < roundsPerHalf; r++) {
        const x = ox + r * (CELL_WIDTH + ROUND_GAP) + CELL_WIDTH / 2;
        ctx.fillText(getHalfRoundLabel(r, roundsPerHalf), x, labelY);
      }
      // Champion label
      ctx.fillText('Final', ox + layout.championX + CHAMP_WIDTH / 2, labelY);
      // Right labels
      const rightEdgeX = totalWidth - CELL_WIDTH - RIGHT_PADDING;
      for (let r = 0; r < roundsPerHalf; r++) {
        const x = ox + rightEdgeX - r * (CELL_WIDTH + ROUND_GAP) + CELL_WIDTH / 2;
        ctx.fillText(getHalfRoundLabel(r, roundsPerHalf), x, labelY);
      }

      // Seed numbers
      if (bracket.showSeedNumbers) {
        ctx.fillStyle = '#9ca3af';
        ctx.font = '12px sans-serif';
        for (let i = 0; i < size; i++) {
          const slotIndex = getSlotIndex(size, 0, i);
          const pos = posMap[slotIndex];
          if (!pos) continue;
          const label = '#' + (i + 1);
          if (pos.isLeftHalf) {
            ctx.textAlign = 'right';
            ctx.fillText(label, ox + pos.x - 4, oy + pos.y + CELL_HEIGHT / 2);
          } else {
            ctx.textAlign = 'left';
            ctx.fillText(label, ox + pos.x + CELL_WIDTH + 4, oy + pos.y + CELL_HEIGHT / 2);
          }
        }
      }

      return canvas;
    }

    document.getElementById('btn-export-png').addEventListener('click', async function() {
      const bracket = state.bracket;
      if (!bracket) return;

      // Ensure font is loaded
      const fontFamily = bracket.titleFont || 'sans-serif';
      if (isGoogleFont(fontFamily)) {
        await loadGoogleFont(fontFamily);
      }
      try {
        await document.fonts.load(`500 14px "${fontFamily}"`);
      } catch (e) {}

      const canvas = renderBracketToCanvas(bracket);
      canvas.toBlob(function(blob) {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = sanitizeFilename(bracket.title) + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 13: File Export and Import (.bracket) ──────────────────────
    // ══════════════════════════════════════════════════════════════════════

    function sanitizeFilename(title) {
      return (title || 'bracket').replace(/[^a-zA-Z0-9_\-\s]/g, '').replace(/\s+/g, '_').substring(0, 60) || 'bracket';
    }

    // ── Save Bracket (download .bracket file) ──
    document.getElementById('btn-save').addEventListener('click', function() {
      const bracket = state.bracket;
      if (!bracket) return;
      const json = JSON.stringify(bracket, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = sanitizeFilename(bracket.title) + '.bracket';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // ── Load Bracket (from .bracket file) ──
    document.getElementById('btn-load').addEventListener('click', function() {
      document.getElementById('load-file-input').click();
    });

    document.getElementById('load-file-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          // Validate required fields
          if (!data.id || !data.size || !data.slots || !data.cells) {
            alert('Invalid bracket file: missing required fields.');
            return;
          }
          if (!BRACKET_SIZES.includes(data.size)) {
            alert('Invalid bracket size: ' + data.size);
            return;
          }
          // Give it a new ID to avoid collisions
          data.id = generateId();
          data.updatedAt = new Date().toISOString();
          state.bracket = data;
          saveBracket(data);
          fullRenderCurrentBracket();
        } catch (err) {
          alert('Failed to load bracket file: ' + err.message);
        }
      };
      reader.readAsText(file);
      // Reset so the same file can be loaded again
      this.value = '';
    });

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 15: Region Focus Navigation ────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    function getBracketRegions(size) {
      if (size <= 16) return null;
      const totalSlots = 2 * size - 1;
      const quarterSize = size / 4;

      if (size === 32 || size === 64) {
        // 4 quarter regions
        const regions = [];
        const regionNames = ['Top Left', 'Bottom Left', 'Top Right', 'Bottom Right'];
        // Each quarter covers quarterSize first-round slots and their downstream
        for (let q = 0; q < 4; q++) {
          const slotIndices = [];
          // First-round slots for this quarter
          const startIdx = q < 2 ? q * quarterSize : size / 2 + (q - 2) * quarterSize;
          for (let i = startIdx; i < startIdx + quarterSize; i++) {
            slotIndices.push(getSlotIndex(size, 0, i));
          }
          // Add downstream rounds fed by these first-round slots
          let currentIndices = [];
          for (let i = startIdx; i < startIdx + quarterSize; i++) {
            currentIndices.push(i);
          }
          let round = 1;
          while (currentIndices.length > 1) {
            const nextIndices = [];
            const seen = new Set();
            for (const idx of currentIndices) {
              const nextIdx = Math.floor(idx / 2);
              if (!seen.has(nextIdx)) {
                seen.add(nextIdx);
                nextIndices.push(nextIdx);
                slotIndices.push(getSlotIndex(size, round, nextIdx));
              }
            }
            currentIndices = nextIndices;
            round++;
            // Stop before we reach the semi-final/champion rounds shared between quarters
            if (currentIndices.length <= 1) break;
          }
          regions.push({ name: regionNames[q], slotIndices });
        }
        return regions;
      }

      if (size === 128) {
        // 8 eighth regions
        const eighthSize = size / 8;
        const regions = [];
        const regionNames = ['Region 1', 'Region 2', 'Region 3', 'Region 4', 'Region 5', 'Region 6', 'Region 7', 'Region 8'];
        for (let q = 0; q < 8; q++) {
          const slotIndices = [];
          const startIdx = q < 4 ? q * eighthSize : size / 2 + (q - 4) * eighthSize;
          for (let i = startIdx; i < startIdx + eighthSize; i++) {
            slotIndices.push(getSlotIndex(size, 0, i));
          }
          let currentIndices = [];
          for (let i = startIdx; i < startIdx + eighthSize; i++) {
            currentIndices.push(i);
          }
          let round = 1;
          while (currentIndices.length > 1) {
            const nextIndices = [];
            const seen = new Set();
            for (const idx of currentIndices) {
              const nextIdx = Math.floor(idx / 2);
              if (!seen.has(nextIdx)) {
                seen.add(nextIdx);
                nextIndices.push(nextIdx);
                slotIndices.push(getSlotIndex(size, round, nextIdx));
              }
            }
            currentIndices = nextIndices;
            round++;
            if (currentIndices.length <= 1) break;
          }
          regions.push({ name: regionNames[q], slotIndices });
        }
        return regions;
      }

      return null;
    }

    function scaleToFit() {
      const container = document.getElementById('bracket-container');
      const inner = document.getElementById('bracket-inner');
      if (!inner) return;

      // Reset transform to measure natural size
      inner.style.transform = '';

      const containerRect = container.getBoundingClientRect();
      const contentWidth = parseInt(inner.style.width) || inner.scrollWidth;
      const contentHeight = parseInt(inner.style.height) || inner.scrollHeight;

      if (contentWidth <= 0 || contentHeight <= 0) return;

      const scaleX = containerRect.width / contentWidth;
      const scaleY = containerRect.height / contentHeight;
      const scale = Math.min(scaleX, scaleY, 1); // don't scale up beyond 1

      inner.style.transform = `scale(${scale})`;
    }

    // Region focus feature removed — use scrollbars for navigation instead.

    // ── Initialize ─────────────────────────────────────────────────────────

    (function initApp() {
      const index = loadBracketIndex();
      let bracket;

      if (index.length > 0) {
        // Load most recently updated
        index.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
        bracket = loadBracket(index[0].id);
      }

      if (!bracket) {
        // No saved brackets — show the creation dialog, don't render yet
        openNewBracketDialog();
        return;
      }

      state.bracket = bracket;
      fullRenderCurrentBracket();
    })();

    // ══════════════════════════════════════════════════════════════════════
    // ── Task 16: Polish and Final Integration ───────────────────────────
    // ══════════════════════════════════════════════════════════════════════

    // scaleToFit() is available as a utility but not called automatically.
    // The bracket uses scrollbars for navigation instead of scaling.
  </script>

</body>
