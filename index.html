<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="brackets-dropdown-0a9b477">
  <title>Matchvine - Bracket Maker</title>
  <style>
    /* ── Reset / Base ──────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: white;
      color: #111827;
    }

    /* ── Utility ───────────────────────────────────────────────────────────── */
    .hidden {
      display: none !important;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Toolbar ───────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      height: 52px;
      background: white;
      position: relative;
      z-index: 10;
    }

    #app-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      margin-right: 4px;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #e5e7eb;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
      font-family: inherit;
    }

    .toolbar-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .toolbar-btn:active {
      background: #f3f4f6;
    }

    .toolbar-btn:focus-visible,
    .size-toggle:focus-visible,
    .font-option:focus-visible,
    .dialog-close:focus-visible,
    .color-swatch:focus-visible,
    .bracket-entry:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    .toolbar-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .toolbar-spacer {
      flex: 1;
    }

    /* ── Bracket Container ─────────────────────────────────────────────────── */
    #bracket-container {
      width: 100%;
      height: calc(100vh - 52px);
      overflow: auto;
      position: relative;
      background: white;
    }

    /* ── Cells ─────────────────────────────────────────────────────────────── */
    .cell {
      border-radius: 8px;
      width: 200px;
      height: 56px;
      cursor: pointer;
      position: absolute;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 1.5px solid #d1d5db;
      overflow: visible;
      user-select: none;
      background: white;
    }

    .cell:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    .cell-editing {
      border-color: #3b82f6;
      border-width: 2px;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .cell-empty {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .cell-text {
      display: block;
      width: 100%;
      text-align: center;
      outline: none;
      word-break: break-word;
      padding: 4px 8px;
      box-sizing: border-box;
      line-height: 1.15;
      overflow: hidden;
    }

    /* Make cell-text not intercept drag events when cell is draggable */
    .cell[draggable="true"] .cell-text {
      pointer-events: none;
    }

    /* Allow text selection inside a cell that is being edited */
    .cell-text[contenteditable="true"] {
      pointer-events: auto;
      user-select: text;
      cursor: text;
    }

    .cell-winner {
      border-color: #22c55e;
      border-width: 2px;
    }

    .cell-loser {
      opacity: 0.65;
    }

    .cell-champion {
      border-color: #f59e0b;
      border-width: 2.5px;
      width: 220px;
    }

    /* ── Promote Button ────────────────────────────────────────────────────── */
    .promote-btn {
      width: 26px;
      height: 38px;
      background: #22c55e;
      border-radius: 0 8px 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding-bottom: 3px; /* visually center the » glyph */
    }

    .promote-btn.promote-left {
      border-radius: 8px 0 0 8px;
    }

    .promote-btn:hover {
      background: #22c55e;
    }

    /* ── Demote Button ─────────────────────────────────────────────────────── */
    .demote-btn {
      width: 26px;
      height: 38px;
      background: #f8a0a0;
      border-radius: 8px 0 0 8px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      color: white;
      font-size: 24px;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      padding-bottom: 3px;
    }

    .demote-btn.demote-right {
      border-radius: 0 8px 8px 0;
    }

    .cell:hover .demote-btn {
      display: flex;
    }

    /* ── Format Icon ───────────────────────────────────────────────────────── */
    .format-icon {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 22px;
      background: white;
      border: 1.5px solid #d1d5db;
      border-top: none;
      border-radius: 0 0 10px 10px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      padding-bottom: 2px;
    }

    .format-icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 8px);
      grid-template-rows: repeat(2, 6px);
      gap: 2px;
    }

    .format-icon-swatch {
      border-radius: 1px;
    }

    /* Invisible hover zone below cell to trigger format-icon */
    .cell::after {
      content: '';
      position: absolute;
      bottom: -26px;
      left: 0;
      right: 0;
      height: 26px;
    }

    .cell:hover .format-icon {
      display: flex;
      border-color: rgba(59, 130, 246, 0.25);
    }

    /* ── Round Labels ──────────────────────────────────────────────────────── */
    .round-label {
      position: absolute;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      font-weight: 500;
    }

    /* ── Seed Number Labels ────────────────────────────────────────────────── */
    .seed-number {
      position: absolute;
      font-size: 14px;
      color: #6b7280;
      font-weight: 500;
    }

    /* ── Bracket Title (on canvas) ────────────────────────────────────────── */
    .bracket-title-display {
      position: absolute;
      text-align: center;
      font-size: 42px;
      font-weight: 400;
      color: #1f2937;
      cursor: pointer;
      outline: none;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 4px 8px;
      box-sizing: border-box;
    }
    .bracket-title-display:hover {
      color: #3b82f6;
    }
    .bracket-title-display:focus {
      border-color: #3b82f6;
      cursor: text;
      color: #1f2937;
    }

    /* ── Color Palette Grid ────────────────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #d1d5db;
    }

    .color-swatch.selected {
      border: 3px solid #3b82f6;
    }

    /* ── Dialog / Modal ────────────────────────────────────────────────────── */
    .dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      width: calc(100% - 32px);
      z-index: 1000;
      overflow: hidden;
    }

    #settings-dialog {
      max-width: 560px;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .dialog-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .dialog-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      color: #6b7280;
      font-family: inherit;
    }

    .dialog-close:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .dialog-body {
      padding: 16px 20px 20px;
    }

    /* ── Dialog Overlay ────────────────────────────────────────────────────── */
    #dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    /* ── Seed Dialog specifics ─────────────────────────────────────────────── */
    #seed-textarea {
      width: 100%;
      height: 180px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      color: #374151;
    }

    #seed-textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    #seed-preview-count {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    #seed-import-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      width: 100%;
      padding: 9px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    #seed-import-btn:hover {
      background: #2563eb;
    }

    /* ── Settings Dialog specifics ─────────────────────────────────────────── */
    .settings-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .size-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .size-toggle {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    .size-toggle:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .size-toggle.active {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8;
    }

    .font-picker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .font-option {
      padding: 12px 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
      text-align: center;
      color: #374151;
      transition: border-color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .font-option:hover {
      border-color: #9ca3af;
    }

    .font-option.selected {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .settings-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #374151;
    }

    /* Simple toggle switch */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #3b82f6;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* ── Brackets Dropdown ──────────────────────────────────────────────────── */
    #brackets-dropdown-wrapper {
      position: relative;
    }

    #brackets-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 1001;
      overflow: hidden;
    }

    #bracket-entries {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 300px;
      overflow-y: auto;
      padding: 8px 8px 0;
    }

    #bracket-entries:empty {
      padding: 0;
    }

    .brackets-dropdown-empty {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      padding: 16px 0;
    }

    .brackets-dropdown-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #e5e7eb;
    }

    .brackets-dropdown-footer #new-bracket-btn {
      flex: 1;
    }

    .brackets-dropdown-file-actions {
      display: flex;
      gap: 4px;
    }

    .brackets-dropdown-file-actions .toolbar-btn {
      font-size: 11px;
      padding: 6px 8px;
    }

    .bracket-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .bracket-entry:hover {
      background: #f9fafb;
    }

    .bracket-entry-active {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .bracket-entry-name {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    .bracket-entry-meta {
      font-size: 11px;
      color: #9ca3af;
    }

    #new-bracket-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 16px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    #new-bracket-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    /* ── Format Popover ────────────────────────────────────────────────────── */
    #format-popover {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 1001;
      padding: 14px 16px;
      width: 240px;
      border: 1px solid #e5e7eb;
    }

    /* CSS arrow pointing down (popover above cell) */
    #format-popover::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid white;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
    }

    /* CSS arrow pointing up (popover below cell) */
    #format-popover.popover-below::after {
      bottom: auto;
      top: -8px;
      border-top: none;
      border-bottom: 8px solid white;
      filter: drop-shadow(0 -2px 2px rgba(0, 0, 0, 0.08));
    }

    .popover-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .popover-section {
      margin-bottom: 12px;
    }

    .popover-section:last-child {
      margin-bottom: 0;
    }

    #bg-color-grid {
      /* inherits .color-grid styles when class is added */
    }

    #settings-bg-color-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    /* auto-contrast — always auto-calculated */

    /* ── Drag and Drop ─────────────────────────────────────────────────── */
    .cell.dragging {
      opacity: 0.4;
    }

    .cell.drag-over {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .cell[draggable="true"] {
      cursor: grab;
    }

    .cell[draggable="true"]:active {
      cursor: grabbing;
    }

    /* ── Polish Transitions ───────────────────────────────────────────────── */
    .cell {
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s, background-color 0.2s;
    }

    .promote-btn {
      opacity: 0;
      transition: opacity 0.2s, background 0.15s;
    }

    .cell:hover .promote-btn {
      opacity: 1;
    }

    .cell-loser {
      transition: opacity 0.4s;
    }

    .dialog {
      transition: opacity 0.15s, transform 0.15s;
    }

    #dialog-overlay {
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <span id="app-name">🌿 Matchvine</span>

    <div class="toolbar-divider"></div>

    <button class="toolbar-btn" id="btn-seed" title="Seed participants">
      📋 Seed
    </button>
    <button class="toolbar-btn disabled" id="btn-shuffle" title="Shuffle participants">
      🔀 Shuffle
    </button>
    <button class="toolbar-btn" id="btn-settings" title="Settings">
      ⚙️ Settings
    </button>
    <button class="toolbar-btn" id="btn-new-toolbar" title="New bracket">
      ✚ New
    </button>

    <div class="toolbar-spacer"></div>

    <button class="toolbar-btn" id="btn-export-png" title="Export as PNG">
      📷 Export PNG
    </button>
    <div id="brackets-dropdown-wrapper">
      <button class="toolbar-btn" id="btn-brackets" title="My brackets">
        📁 Brackets
      </button>
      <div id="brackets-dropdown" class="hidden">
        <div id="bracket-entries">
          <!-- bracket entry items injected by JS -->
        </div>
        <div class="brackets-dropdown-footer">
          <button id="new-bracket-btn">+ New Bracket</button>
          <div class="brackets-dropdown-file-actions">
            <button class="toolbar-btn" id="btn-save" title="Save bracket to file">💾 Save</button>
            <button class="toolbar-btn" id="btn-load" title="Load bracket from file">📂 Load</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hidden file input for load -->
    <input type="file" id="load-file-input" accept=".bracket" class="hidden">
  </div>

  <!-- ── Bracket Container ─────────────────────────────────────────────────── -->
  <div id="bracket-container"></div>

  <!-- ── Dialog Overlay ────────────────────────────────────────────────────── -->
  <div id="dialog-overlay" class="hidden"></div>

  <!-- ── Seed Dialog ───────────────────────────────────────────────────────── -->
  <div id="seed-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Seed Participants</span>
      <button class="dialog-close" id="seed-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <textarea
        id="seed-textarea"
        placeholder="Enter one participant per line…"
        spellcheck="false"
      ></textarea>
      <p id="seed-preview-count">0 participants entered</p>
      <button id="seed-import-btn">Import Participants</button>
    </div>
  </div>

  <!-- ── Settings Dialog ───────────────────────────────────────────────────── -->
  <div id="settings-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Settings</span>
      <button class="dialog-close" id="settings-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">

      <div class="settings-section">
        <div class="settings-section-label">Bracket Size</div>
        <div class="size-toggles" id="size-toggles">
          <button class="size-toggle active" data-size="4">4</button>
          <button class="size-toggle" data-size="8">8</button>
          <button class="size-toggle" data-size="16">16</button>
          <button class="size-toggle" data-size="32">32</button>
          <button class="size-toggle" data-size="64">64</button>
          <button class="size-toggle" data-size="128">128</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Font</div>
        <div class="font-picker-grid" id="font-picker-grid">
          <!-- font options injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Background Color</div>
        <div class="color-grid" id="settings-bg-color-grid" style="grid-template-columns: repeat(4, 1fr)">
          <!-- color swatches injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Options</div>
        <div class="settings-toggle-row">
          <label class="toggle-label" for="toggle-seed-numbers">Show seed numbers</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-seed-numbers">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-toggle-row" style="margin-top: 8px;">
          <label class="toggle-label" for="toggle-auto-color">Auto-color new cells</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-auto-color">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Layout</div>
        <div class="layout-toggles" id="layout-toggles">
          <button class="size-toggle active" data-layout="staggered">Compact</button>
          <button class="size-toggle" data-layout="full">Wide</button>
        </div>
      </div>

      <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; text-align: center;">
        <a href="https://github.com/ttop/matchvine" target="_blank" style="color: #6b7280; font-size: 12px; text-decoration: none;">
          🌿 Matchvine on GitHub
        </a>
      </div>

    </div>
  </div>


  <!-- ── New Bracket Dialog ───────────────────────────────────────────────── -->
  <div id="new-bracket-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Create New Bracket</span>
      <button class="dialog-close" id="new-bracket-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <div class="settings-section">
        <div class="settings-section-label">Bracket Title</div>
        <input type="text" id="new-bracket-title-input" value="New Bracket" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" />
      </div>
      <div class="settings-section">
        <div class="settings-section-label">Bracket Size</div>
        <div class="size-toggles" id="new-bracket-size-toggles">
          <button class="size-toggle" data-size="4">4</button>
          <button class="size-toggle" data-size="8">8</button>
          <button class="size-toggle active" data-size="16">16</button>
          <button class="size-toggle" data-size="32">32</button>
          <button class="size-toggle" data-size="64">64</button>
          <button class="size-toggle" data-size="128">128</button>
        </div>
      </div>
      <button id="new-bracket-create-btn" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 16px;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.1s;">Create Bracket</button>
    </div>
  </div>

  <!-- ── Format Popover ────────────────────────────────────────────────────── -->
  <div id="format-popover" class="hidden">
    <button id="format-popover-close" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:14px;color:#6b7280;display:flex;align-items:center;justify-content:center;" title="Close">✕</button>
    <div class="popover-section">
      <div class="popover-section-label">Background</div>
      <div class="color-grid" id="bg-color-grid">
        <!-- color swatches injected by JS -->
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>

</body>
</html>
