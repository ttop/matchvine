<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchvine — Tournament Bracket Maker</title>
  <style>
    /* ── Reset / Base ──────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: white;
      color: #111827;
      overflow: hidden;
    }

    /* ── Utility ───────────────────────────────────────────────────────────── */
    .hidden {
      display: none !important;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Toolbar ───────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      height: 52px;
      background: white;
      position: relative;
      z-index: 10;
    }

    #app-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      margin-right: 4px;
    }

    #bracket-title {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      outline: none;
      min-width: 120px;
      max-width: 280px;
      transition: border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bracket-title:focus {
      border-color: #3b82f6;
    }

    #bracket-title:hover:not(:focus) {
      border-color: #d1d5db;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #e5e7eb;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
      font-family: inherit;
    }

    .toolbar-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .toolbar-btn:active {
      background: #f3f4f6;
    }

    .toolbar-btn:focus-visible,
    .size-toggle:focus-visible,
    .font-option:focus-visible,
    .dialog-close:focus-visible,
    .color-swatch:focus-visible,
    .bracket-entry:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    .toolbar-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .toolbar-spacer {
      flex: 1;
    }

    /* ── Bracket Container ─────────────────────────────────────────────────── */
    #bracket-container {
      width: 100%;
      height: calc(100vh - 52px);
      overflow: hidden;
      position: relative;
      background: white;
    }

    /* ── Cells ─────────────────────────────────────────────────────────────── */
    .cell {
      border-radius: 8px;
      width: 150px;
      height: 48px;
      cursor: pointer;
      position: absolute;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 1.5px solid #d1d5db;
      overflow: hidden;
      user-select: none;
      background: white;
    }

    .cell:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    .cell-editing {
      border-color: #3b82f6;
      border-width: 2px;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .cell-empty {
      background: #f3f4f6;
      color: #9ca3af;
    }

    /* Allow text selection inside a cell that is being edited */
    .cell-text[contenteditable="true"] {
      user-select: text;
      cursor: text;
    }

    .cell-winner {
      border-color: #22c55e;
      border-width: 2px;
    }

    .cell-loser {
      opacity: 0.5;
    }

    .cell-champion {
      border-color: #f59e0b;
      border-width: 2.5px;
      width: 170px;
    }

    /* ── Promote Button ────────────────────────────────────────────────────── */
    .promote-btn {
      width: 26px;
      height: 26px;
      background: #e5e7eb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
      font-weight: bold;
      position: absolute;
    }

    .promote-btn:hover {
      background: #d1d5db;
    }

    /* ── Demote Button ─────────────────────────────────────────────────────── */
    .demote-btn {
      width: 20px;
      height: 20px;
      background: #ef4444;
      border-radius: 50%;
      position: absolute;
      top: -8px;
      right: -8px;
      display: none;
      color: white;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .cell:hover .demote-btn {
      display: flex;
    }

    /* ── Format Icon ───────────────────────────────────────────────────────── */
    .format-icon {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 5px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #d1d5db;
    }

    .cell:hover .format-icon {
      display: flex;
    }

    /* ── Round Labels ──────────────────────────────────────────────────────── */
    .round-label {
      position: absolute;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }

    /* ── Seed Number Labels ────────────────────────────────────────────────── */
    .seed-number {
      position: absolute;
      font-size: 9px;
      color: #9ca3af;
    }

    /* ── Color Palette Grid ────────────────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #d1d5db;
    }

    .color-swatch.selected {
      border: 3px solid #3b82f6;
    }

    /* ── Dialog / Modal ────────────────────────────────────────────────────── */
    .dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      width: calc(100% - 32px);
      z-index: 1000;
      overflow: hidden;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .dialog-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .dialog-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      color: #6b7280;
      font-family: inherit;
    }

    .dialog-close:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .dialog-body {
      padding: 16px 20px 20px;
    }

    /* ── Dialog Overlay ────────────────────────────────────────────────────── */
    #dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    /* ── Seed Dialog specifics ─────────────────────────────────────────────── */
    #seed-textarea {
      width: 100%;
      height: 180px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      color: #374151;
    }

    #seed-textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    #seed-preview-count {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    #seed-import-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      width: 100%;
      padding: 9px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    #seed-import-btn:hover {
      background: #2563eb;
    }

    /* ── Settings Dialog specifics ─────────────────────────────────────────── */
    .settings-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .size-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .size-toggle {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      color: #374151;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    .size-toggle:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .size-toggle.active {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8;
    }

    .font-picker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .font-option {
      padding: 8px 6px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
      text-align: center;
      color: #374151;
      transition: border-color 0.1s;
    }

    .font-option:hover {
      border-color: #9ca3af;
    }

    .font-option.selected {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .settings-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #374151;
    }

    /* Simple toggle switch */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #3b82f6;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* ── Brackets List Dialog specifics ────────────────────────────────────── */
    #bracket-entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .bracket-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .bracket-entry:hover {
      background: #f9fafb;
    }

    .bracket-entry-name {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    .bracket-entry-meta {
      font-size: 11px;
      color: #9ca3af;
    }

    #new-bracket-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 16px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }

    #new-bracket-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    /* ── Format Popover ────────────────────────────────────────────────────── */
    #format-popover {
      position: absolute;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 1001;
      padding: 14px 16px;
      width: 240px;
      border: 1px solid #e5e7eb;
    }

    /* CSS arrow pointing down */
    #format-popover::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid white;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
    }

    .popover-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .popover-section {
      margin-bottom: 12px;
    }

    .popover-section:last-child {
      margin-bottom: 0;
    }

    #bg-color-grid {
      /* inherits .color-grid styles when class is added */
    }

    #text-color-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .auto-contrast-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .auto-contrast-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .auto-contrast-row label {
      font-size: 12px;
      color: #374151;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <span id="app-name">🌿 Matchvine</span>
    <span
      id="bracket-title"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="Untitled Bracket"
    >Untitled Bracket</span>

    <div class="toolbar-divider"></div>

    <button class="toolbar-btn" id="btn-seed" title="Seed participants">
      📋 Seed
    </button>
    <button class="toolbar-btn disabled" id="btn-shuffle" title="Shuffle participants">
      🔀 Shuffle
    </button>
    <button class="toolbar-btn" id="btn-settings" title="Settings">
      ⚙️ Settings
    </button>

    <div class="toolbar-spacer"></div>

    <button class="toolbar-btn" id="btn-export-png" title="Export as PNG">
      📷 Export PNG
    </button>
    <button class="toolbar-btn" id="btn-save" title="Save bracket">
      💾 Save Bracket
    </button>
    <button class="toolbar-btn" id="btn-load" title="Load bracket from file">
      📂 Load Bracket
    </button>
    <button class="toolbar-btn" id="btn-brackets" title="My brackets">
      📁 Brackets
    </button>

    <!-- Hidden file input for load -->
    <input type="file" id="load-file-input" accept=".bracket" class="hidden">
  </div>

  <!-- ── Bracket Container ─────────────────────────────────────────────────── -->
  <div id="bracket-container"></div>

  <!-- ── Dialog Overlay ────────────────────────────────────────────────────── -->
  <div id="dialog-overlay" class="hidden"></div>

  <!-- ── Seed Dialog ───────────────────────────────────────────────────────── -->
  <div id="seed-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Seed Participants</span>
      <button class="dialog-close" id="seed-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <textarea
        id="seed-textarea"
        placeholder="Enter one participant per line…"
        spellcheck="false"
      ></textarea>
      <p id="seed-preview-count">0 participants entered</p>
      <button id="seed-import-btn">Import Participants</button>
    </div>
  </div>

  <!-- ── Settings Dialog ───────────────────────────────────────────────────── -->
  <div id="settings-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">Settings</span>
      <button class="dialog-close" id="settings-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">

      <div class="settings-section">
        <div class="settings-section-label">Bracket Size</div>
        <div class="size-toggles" id="size-toggles">
          <button class="size-toggle active" data-size="4">4</button>
          <button class="size-toggle" data-size="8">8</button>
          <button class="size-toggle" data-size="16">16</button>
          <button class="size-toggle" data-size="32">32</button>
          <button class="size-toggle" data-size="64">64</button>
          <button class="size-toggle" data-size="128">128</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Font</div>
        <div class="font-picker-grid" id="font-picker-grid">
          <!-- font options injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Background Color</div>
        <div class="color-grid" id="settings-bg-color-grid">
          <!-- color swatches injected by JS -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Options</div>
        <div class="settings-toggle-row">
          <label class="toggle-label" for="toggle-seed-numbers">Show seed numbers</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-seed-numbers">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Brackets List Dialog ──────────────────────────────────────────────── -->
  <div id="brackets-dialog" class="dialog hidden">
    <div class="dialog-header">
      <span class="dialog-title">My Brackets</span>
      <button class="dialog-close" id="brackets-dialog-close" title="Close">✕</button>
    </div>
    <div class="dialog-body">
      <div id="bracket-entries">
        <!-- bracket entry items injected by JS -->
      </div>
      <button id="new-bracket-btn">+ New Bracket</button>
    </div>
  </div>

  <!-- ── Format Popover ────────────────────────────────────────────────────── -->
  <div id="format-popover" class="hidden">
    <div class="popover-section">
      <div class="popover-section-label">Background</div>
      <div class="color-grid" id="bg-color-grid">
        <!-- color swatches injected by JS -->
      </div>
    </div>
    <div class="popover-section">
      <div class="popover-section-label">Text Color</div>
      <div id="text-color-row">
        <!-- color swatches injected by JS -->
      </div>
      <div class="auto-contrast-row">
        <input type="checkbox" id="auto-contrast" checked>
        <label for="auto-contrast">Auto contrast</label>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────

    const BRACKET_SIZES = [4, 8, 16, 32, 64, 128];

    // 5 rows of 8: pastels, medium tones, vivid/saturated, very light tints, neutrals
    const COLOR_PALETTE = [
      // Row 1: Pastels
      '#ffb3b3', '#ffcc99', '#fff099', '#b3ffb3', '#b3ffff', '#b3ccff', '#d9b3ff', '#ffb3e6',
      // Row 2: Medium tones
      '#ff8080', '#ff9f40', '#ffd700', '#66cc66', '#40bfbf', '#6699ff', '#b366ff', '#ff66b3',
      // Row 3: Vivid/saturated
      '#ff4d4d', '#ff8000', '#f0c800', '#33b833', '#00aaaa', '#3366ff', '#9933ff', '#ff3399',
      // Row 4: Very light tints
      '#fff0f0', '#fff5e6', '#fffde6', '#f0fff0', '#e6ffff', '#eef2ff', '#f5f0ff', '#fff0f9',
      // Row 5: Neutrals
      '#ffffff', '#f3f4f6', '#d1d5db', '#9ca3af', '#f5f0e8', '#e8dcc8', '#d4c4a0', '#c8b88a',
    ];

    const TEXT_COLORS = [
      '#1a1a1a',
      '#374151',
      '#6b7280',
      '#ffffff',
      '#1e40af',
      '#991b1b',
      '#166534',
    ];

    const DEFAULT_FONTS = [
      { name: 'Sans-serif',  family: 'sans-serif' },
      { name: 'Serif',       family: 'serif' },
      { name: 'Monospace',   family: 'monospace' },
      { name: 'Cursive',     family: 'cursive' },
      { name: 'Fantasy',     family: 'fantasy' },
    ];

    const GOOGLE_FONTS = [
      'Inter',
      'Roboto',
      'Lato',
      'Merriweather',
      'Playfair Display',
      'Oswald',
      'Raleway',
      'Nunito',
      'Poppins',
      'Bebas Neue',
      'Pacifico',
      'Bangers',
      'Permanent Marker',
      'Fredoka One',
      'Righteous',
    ];

    const CELL_WIDTH  = 150;
    const CELL_HEIGHT = 48;
    const ROUND_GAP   = 60;
    const CELL_GAP    = 8;
    const CHAMP_WIDTH = 170;
    const TOP_PADDING = 20;
    const LABEL_MARGIN = 40;

    // ── State ────────────────────────────────────────────────────────────────

    const state = {
      bracket: null,
    };

    // ── Utility helpers ──────────────────────────────────────────────────────

    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).slice(2, 11);
    }

    // ── Factory functions ─────────────────────────────────────────────────────

    function createBracket(size, title) {
      const totalSlots = 2 * size - 1;
      const slots = [];

      for (let i = 0; i < totalSlots; i++) {
        // Determine which round this flat index belongs to
        let round = 0;
        let offset = 0;
        while (true) {
          const slotsInRound = getSlotsInRound(size, round);
          if (i < offset + slotsInRound) {
            break;
          }
          offset += slotsInRound;
          round++;
        }
        const indexInRound = i - getSlotOffset(size, round);
        slots.push({ round, index: indexInRound, cellId: null });
      }

      const now = new Date().toISOString();
      return {
        id: generateId(),
        title: title || 'My Bracket',
        titleFont: 'sans-serif',
        size,
        backgroundColor: '#ffffff',
        showSeedNumbers: true,
        createdAt: now,
        updatedAt: now,
        cells: {},
        slots,
        zoomState: { focused: false, region: null },
      };
    }

    function createCell(text, bgColor) {
      return {
        id: generateId(),
        text: text || '',
        textColor: getAutoTextColor(bgColor || '#ffffff'),
        bgColor: bgColor || '#ffffff',
        sourceSlot: null,
      };
    }

    // ── Slot indexing math ────────────────────────────────────────────────────

    /** How many slots are in a given round. */
    function getSlotsInRound(size, round) {
      return size >> round; // size / 2^round
    }

    /** Starting flat-array index for the first slot in a given round. */
    function getSlotOffset(size, round) {
      let offset = 0;
      for (let r = 0; r < round; r++) {
        offset += getSlotsInRound(size, r);
      }
      return offset;
    }

    /** Total number of rounds (including the 1-slot champion round). */
    function getTotalRounds(size) {
      return Math.log2(size) + 1;
    }

    /** Flat array index for a slot at a given round and position within that round. */
    function getSlotIndex(size, round, indexInRound) {
      return getSlotOffset(size, round) + indexInRound;
    }

    /**
     * Returns the two flat slot indices from the previous round that feed into
     * this slot.  Returns null for round 0 (no feeders).
     */
    function getMatchupPair(size, round, indexInRound) {
      if (round === 0) return null;
      const prevRound = round - 1;
      const feederA   = indexInRound * 2;
      const feederB   = indexInRound * 2 + 1;
      return [
        getSlotIndex(size, prevRound, feederA),
        getSlotIndex(size, prevRound, feederB),
      ];
    }

    /**
     * Returns the { round, index } of the next slot this one promotes into.
     * Returns null for the champion slot.
     */
    function getNextSlot(size, round, indexInRound) {
      const totalRounds = getTotalRounds(size);
      if (round >= totalRounds - 1) return null; // champion slot
      return {
        round: round + 1,
        index: Math.floor(indexInRound / 2),
      };
    }

    /**
     * Returns true if this slot is in the left half of the bracket.
     * For round 0: left half = first size/2 entries.
     * For later rounds: follows whatever round-0 slots feed into it.
     */
    function isLeftHalf(size, round, indexInRound) {
      if (round === 0) {
        return indexInRound < size / 2;
      }
      // Trace back to round 0
      let r   = round;
      let idx = indexInRound;
      while (r > 0) {
        idx = idx * 2; // left-most feeder path
        r--;
      }
      return idx < size / 2;
    }

    /** Flat index of the champion (final) slot. */
    function getChampionSlotIndex(size) {
      return 2 * size - 2;
    }

    // ── Contrast / colour helpers ─────────────────────────────────────────────

    /** WCAG 2.1 relative luminance for a hex colour string. */
    function getLuminance(hexColor) {
      if (!hexColor || !/^#[0-9a-fA-F]{6}$/.test(hexColor)) return 0;
      const hex = hexColor.replace('#', '');
      const r   = parseInt(hex.substring(0, 2), 16) / 255;
      const g   = parseInt(hex.substring(2, 4), 16) / 255;
      const b   = parseInt(hex.substring(4, 6), 16) / 255;

      const toLinear = c =>
        c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);

      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }

    /** WCAG contrast ratio between two hex colours. */
    function getContrastRatio(color1, color2) {
      const l1 = getLuminance(color1);
      const l2 = getLuminance(color2);
      const lighter = Math.max(l1, l2);
      const darker  = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }

    /**
     * Choose dark or light text colour based on the background.
     * Uses dark text (#1a1a1a) when it achieves >= 4.5 contrast ratio,
     * otherwise falls back to white.
     */
    function getAutoTextColor(bgColor) {
      const darkText = '#1a1a1a';
      const lightText = '#ffffff';
      return getContrastRatio(bgColor, darkText) >= 4.5 ? darkText : lightText;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Layout position calculator ─────────────────────────────────────────

    function calculateLayout(bracket) {
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);
      const positions = [];

      // Build a map keyed by slotIndex for easy lookup
      const posMap = {};

      // Half size for left/right split
      const halfSize = size / 2;
      const roundsPerHalf = Math.log2(halfSize) + 1; // rounds 0..roundsPerHalf-1 in each half

      // Height of round-0 column in one half
      const round0CountPerHalf = halfSize;
      const round0Height = round0CountPerHalf * CELL_HEIGHT + (round0CountPerHalf - 1) * CELL_GAP;

      // Total height: round-0 height + margin for labels
      const totalHeight = round0Height + TOP_PADDING * 2 + LABEL_MARGIN;

      // Total width: left half columns + gap + champion + gap + right half columns
      const leftCols = roundsPerHalf;
      const rightCols = roundsPerHalf;
      const CENTER_GAP = ROUND_GAP;
      const totalWidth = leftCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP + CENTER_GAP + CHAMP_WIDTH + CENTER_GAP + rightCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP;

      // Champion x position: center
      const championX = leftCols * (CELL_WIDTH + ROUND_GAP) - ROUND_GAP + CENTER_GAP;

      // --- Place round 0 cells for LEFT half (indices 0..halfSize-1) ---
      for (let i = 0; i < halfSize; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        const y = TOP_PADDING + i * (CELL_HEIGHT + CELL_GAP);
        const x = 0;
        const pos = {
          slotIndex,
          round: 0,
          indexInRound: i,
          x,
          y,
          isLeftHalf: true,
          isChampion: false,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      // --- Place round 0 cells for RIGHT half (indices halfSize..size-1) ---
      const rightEdgeX = totalWidth - CELL_WIDTH;
      for (let i = halfSize; i < size; i++) {
        const slotIndex = getSlotIndex(size, 0, i);
        const y = TOP_PADDING + (i - halfSize) * (CELL_HEIGHT + CELL_GAP);
        const x = rightEdgeX;
        const pos = {
          slotIndex,
          round: 0,
          indexInRound: i,
          x,
          y,
          isLeftHalf: false,
          isChampion: false,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      // --- Place rounds 1+ for both halves (not champion) ---
      for (let round = 1; round < totalRounds - 1; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const leftHalf = isLeftHalf(size, round, idx);
          const feeders = getMatchupPair(size, round, idx);
          const feederA = posMap[feeders[0]];
          const feederB = posMap[feeders[1]];
          const y = (feederA.y + feederB.y) / 2;

          let x;
          if (leftHalf) {
            x = round * (CELL_WIDTH + ROUND_GAP);
          } else {
            // For right half, figure out which "column index from right" this is
            // Right half round 0 is at rightEdgeX. Round 1 is one step left, etc.
            // We need to know which local round within the right half this is.
            // Right half round-0 indices start at halfSize.
            // For round R in right half, local column = R (same as round number, since
            // both halves share the same round numbers)
            x = rightEdgeX - round * (CELL_WIDTH + ROUND_GAP);
          }

          const pos = {
            slotIndex,
            round,
            indexInRound: idx,
            x,
            y,
            isLeftHalf: leftHalf,
            isChampion: false,
          };
          positions.push(pos);
          posMap[slotIndex] = pos;
        }
      }

      // --- Place champion slot ---
      {
        const champRound = totalRounds - 1;
        const slotIndex = getChampionSlotIndex(size);
        const feeders = getMatchupPair(size, champRound, 0);
        const feederA = posMap[feeders[0]];
        const feederB = posMap[feeders[1]];
        const y = (feederA.y + feederB.y) / 2;
        const pos = {
          slotIndex,
          round: champRound,
          indexInRound: 0,
          x: championX,
          y,
          isLeftHalf: false,
          isChampion: true,
        };
        positions.push(pos);
        posMap[slotIndex] = pos;
      }

      return { positions, posMap, totalWidth, totalHeight, championX, CHAMP_WIDTH };
    }

    // ── Bracket rendering ──────────────────────────────────────────────────

    function renderBracket(bracket) {
      const container = document.getElementById('bracket-container');
      const layout = calculateLayout(bracket);
      const { positions, posMap, totalWidth, totalHeight, championX, CHAMP_WIDTH } = layout;
      const { size } = bracket;
      const totalRounds = getTotalRounds(size);

      container.innerHTML = '';
      container.style.width = totalWidth + 'px';
      container.style.height = totalHeight + 'px';

      // SVG for connector lines
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', totalWidth);
      svg.setAttribute('height', totalHeight);
      svg.style.position = 'absolute';
      svg.style.left = '0';
      svg.style.top = '0';
      svg.style.pointerEvents = 'none';
      container.appendChild(svg);

      // Wrapper for cells
      const cellWrapper = document.createElement('div');
      cellWrapper.style.position = 'absolute';
      cellWrapper.style.left = '0';
      cellWrapper.style.top = '0';
      cellWrapper.style.width = totalWidth + 'px';
      cellWrapper.style.height = totalHeight + 'px';
      container.appendChild(cellWrapper);

      // -- Collect which cellIds appear in later rounds (for winner/loser styling) --
      const promotedCellIds = new Set();
      for (let round = 1; round < totalRounds; round++) {
        const slotsInRound = getSlotsInRound(size, round);
        for (let idx = 0; idx < slotsInRound; idx++) {
          const slotIndex = getSlotIndex(size, round, idx);
          const slot = bracket.slots[slotIndex];
          if (slot && slot.cellId) {
            promotedCellIds.add(slot.cellId);
          }
        }
      }
      // -- Render cells --
      for (const pos of positions) {
        const slot = bracket.slots[pos.slotIndex];
        const cellEl = document.createElement('div');
        cellEl.className = 'cell';

        const isChamp = pos.isChampion;
        const cellWidth = isChamp ? CHAMP_WIDTH : CELL_WIDTH;

        if (!slot || !slot.cellId) {
          cellEl.classList.add('cell-empty');
        }
        if (isChamp) {
          cellEl.classList.add('cell-champion');
        }

        cellEl.style.left = pos.x + 'px';
        cellEl.style.top = pos.y + 'px';
        cellEl.style.width = cellWidth + 'px';
        cellEl.style.height = CELL_HEIGHT + 'px';
        cellEl.setAttribute('data-slot-index', pos.slotIndex);
        cellEl.setAttribute('data-round', pos.round);
        cellEl.setAttribute('data-index-in-round', pos.indexInRound);

        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          const cell = bracket.cells[slot.cellId];
          cellEl.style.backgroundColor = cell.bgColor || '#ffffff';
          cellEl.style.color = cell.textColor || '#1a1a1a';

          // Check for winner/loser styling in round-0 feeder context
          if (pos.round < totalRounds - 1 && promotedCellIds.has(slot.cellId)) {
            // This cell has been promoted to a later round — check if it won from this slot
            const next = getNextSlot(size, pos.round, pos.indexInRound);
            if (next) {
              const nextSlotIndex = getSlotIndex(size, next.round, next.index);
              const nextSlot = bracket.slots[nextSlotIndex];
              if (nextSlot && nextSlot.cellId === slot.cellId) {
                cellEl.classList.add('cell-winner');
              } else if (nextSlot && nextSlot.cellId && nextSlot.cellId !== slot.cellId) {
                cellEl.classList.add('cell-loser');
              }
            }
          }

          // Display text with line break support
          const textContent = cell.text || '';
          const safeText = escapeHtml(textContent).replace(/\n/g, '<br>');
          if (isChamp) {
            cellEl.innerHTML = '<span style="margin-right:4px">🏆</span>' + safeText;
          } else {
            cellEl.innerHTML = safeText;
          }
        } else {
          // Empty slot
          if (isChamp) {
            cellEl.innerHTML = '🏆 ?';
          } else {
            cellEl.textContent = '?';
          }
        }

        cellWrapper.appendChild(cellEl);
      }

      // -- Draw connector lines --
      const strokeColor = '#9ca3af';
      const strokeWidth = '1.5';

      function svgLine(x1, y1, x2, y2) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', strokeColor);
        line.setAttribute('stroke-width', strokeWidth);
        svg.appendChild(line);
      }

      for (const pos of positions) {
        if (pos.round === 0) continue;

        const feeders = getMatchupPair(size, pos.round, pos.indexInRound);
        if (!feeders) continue;

        const feederA = posMap[feeders[0]];
        const feederB = posMap[feeders[1]];
        if (!feederA || !feederB) continue;

        const cellWidth = pos.isChampion ? CHAMP_WIDTH : CELL_WIDTH;
        const midY = pos.y + CELL_HEIGHT / 2;
        const feederAMidY = feederA.y + CELL_HEIGHT / 2;
        const feederBMidY = feederB.y + CELL_HEIGHT / 2;

        if (pos.isChampion) {
          // Champion: feeders come from both halves
          // Left semi-final: connector from right edge to champion left edge
          const leftFeeder = feederA.isLeftHalf ? feederA : feederB;
          const rightFeeder = feederA.isLeftHalf ? feederB : feederA;

          // Left feeder -> champion
          const ljx = leftFeeder.x + CELL_WIDTH + (pos.x - (leftFeeder.x + CELL_WIDTH)) / 2;
          const leftMidY = leftFeeder.y + CELL_HEIGHT / 2;
          svgLine(leftFeeder.x + CELL_WIDTH, leftMidY, ljx, leftMidY);
          svgLine(ljx, leftMidY, ljx, midY);
          svgLine(ljx, midY, pos.x, midY);

          // Right feeder -> champion
          const rjx = rightFeeder.x - (rightFeeder.x - (pos.x + CHAMP_WIDTH)) / 2;
          const rightMidY = rightFeeder.y + CELL_HEIGHT / 2;
          svgLine(rightFeeder.x, rightMidY, rjx, rightMidY);
          svgLine(rjx, rightMidY, rjx, midY);
          svgLine(rjx, midY, pos.x + CHAMP_WIDTH, midY);

        } else if (pos.isLeftHalf) {
          // Left half: horizontal from right edge of feeders -> vertical -> horizontal to current cell left edge
          const jx = feederA.x + CELL_WIDTH + (pos.x - (feederA.x + CELL_WIDTH)) / 2;
          svgLine(feederA.x + CELL_WIDTH, feederAMidY, jx, feederAMidY);
          svgLine(feederB.x + CELL_WIDTH, feederBMidY, jx, feederBMidY);
          svgLine(jx, feederAMidY, jx, feederBMidY);
          svgLine(jx, midY, pos.x, midY);

        } else {
          // Right half: horizontal from left edge of feeders -> vertical -> horizontal to current cell right edge
          const jx = feederA.x - (feederA.x - (pos.x + CELL_WIDTH)) / 2;
          svgLine(feederA.x, feederAMidY, jx, feederAMidY);
          svgLine(feederB.x, feederBMidY, jx, feederBMidY);
          svgLine(jx, feederAMidY, jx, feederBMidY);
          svgLine(jx, midY, pos.x + CELL_WIDTH, midY);
        }
      }

      // -- Round labels --
      const halfSize = size / 2;
      const roundsPerHalf = Math.log2(halfSize) + 1;
      const labelY = totalHeight - 30;

      function getHalfRoundLabel(round, roundsInHalf) {
        if (round === roundsInHalf - 1) return 'Semis';
        return 'Round ' + (round + 1);
      }

      // Left half labels
      for (let r = 0; r < roundsPerHalf; r++) {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        const x = r * (CELL_WIDTH + ROUND_GAP);
        labelEl.style.left = x + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CELL_WIDTH + 'px';
        labelEl.textContent = getHalfRoundLabel(r, roundsPerHalf);
        cellWrapper.appendChild(labelEl);
      }

      // Champion label
      {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        labelEl.style.left = championX + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CHAMP_WIDTH + 'px';
        labelEl.textContent = 'Final';
        cellWrapper.appendChild(labelEl);
      }

      // Right half labels (mirrored)
      const rightEdgeX = totalWidth - CELL_WIDTH;
      for (let r = 0; r < roundsPerHalf; r++) {
        const labelEl = document.createElement('div');
        labelEl.className = 'round-label';
        const x = rightEdgeX - r * (CELL_WIDTH + ROUND_GAP);
        labelEl.style.left = x + 'px';
        labelEl.style.top = labelY + 'px';
        labelEl.style.width = CELL_WIDTH + 'px';
        labelEl.textContent = getHalfRoundLabel(r, roundsPerHalf);
        cellWrapper.appendChild(labelEl);
      }

      // -- Seed numbers --
      if (bracket.showSeedNumbers) {
        for (let i = 0; i < size; i++) {
          const slotIndex = getSlotIndex(size, 0, i);
          const slot = bracket.slots[slotIndex];
          const pos = posMap[slotIndex];
          if (!pos) continue;

          const seedEl = document.createElement('div');
          seedEl.className = 'seed-number';
          seedEl.textContent = '#' + (i + 1);
          seedEl.style.top = (pos.y + CELL_HEIGHT / 2 - 6) + 'px';

          if (pos.isLeftHalf) {
            seedEl.style.left = (pos.x - 22) + 'px';
          } else {
            seedEl.style.left = (pos.x + CELL_WIDTH + 4) + 'px';
          }

          cellWrapper.appendChild(seedEl);
        }
      }
    }

    // ── Cell Editing State ────────────────────────────────────────────────

    state.editingSlotIndex = null;
    state.beforeEditText   = null;

    // ── autoSizeText ──────────────────────────────────────────────────────

    function autoSizeText(cellDiv) {
      const textEl = cellDiv.querySelector('.cell-text');
      if (!textEl) return;

      const BASE_FONT = 16;
      const MIN_FONT  = 9;
      const PAD       = 8; // horizontal/vertical padding allowance

      let fontSize = BASE_FONT;
      textEl.style.fontSize = fontSize + 'px';

      while (fontSize > MIN_FONT) {
        if (
          textEl.scrollHeight <= cellDiv.clientHeight - PAD &&
          textEl.scrollWidth  <= cellDiv.clientWidth  - PAD
        ) {
          break;
        }
        fontSize--;
        textEl.style.fontSize = fontSize + 'px';
      }
    }

    // ── exitEditMode ──────────────────────────────────────────────────────

    function exitEditMode() {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(
        `.cell[data-slot-index="${state.editingSlotIndex}"]`
      );
      if (cellEl) {
        cellEl.classList.remove('cell-editing');
        const textEl = cellEl.querySelector('.cell-text');
        if (textEl) {
          textEl.contentEditable = 'false';
        }
      }

      state.editingSlotIndex = null;
      state.beforeEditText   = null;
    }

    // ── confirmEdit ───────────────────────────────────────────────────────

    function confirmEdit() {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(
        `.cell[data-slot-index="${state.editingSlotIndex}"]`
      );

      if (cellEl) {
        const textEl = cellEl.querySelector('.cell-text');
        if (textEl) {
          // Extract text, converting <br> back to \n
          let rawHtml = textEl.innerHTML;
          rawHtml = rawHtml.replace(/<br\s*\/?>/gi, '\n');
          // Strip any other HTML tags
          const tmp = document.createElement('div');
          tmp.innerHTML = rawHtml;
          const newText = tmp.textContent;

          const bracket = state.bracket;
          const slot = bracket.slots[state.editingSlotIndex];
          if (slot && slot.cellId && bracket.cells[slot.cellId]) {
            bracket.cells[slot.cellId].text = newText;
          }
        }
      }

      const slotIdx = state.editingSlotIndex;
      exitEditMode();
      renderBracket(state.bracket);

      // Re-apply auto-sizing to the confirmed cell
      const updatedCellEl = document.getElementById('bracket-container').querySelector(
        `.cell[data-slot-index="${slotIdx}"]`
      );
      if (updatedCellEl) {
        autoSizeText(updatedCellEl);
      }
    }

    // ── enterEditMode ─────────────────────────────────────────────────────

    function enterEditMode(slotIndex) {
      const bracket = state.bracket;
      const slot = bracket.slots[slotIndex];

      // If empty slot, create a new cell first
      if (!slot.cellId) {
        const color = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
        const newCell = createCell('', color);
        bracket.cells[newCell.id] = newCell;
        slot.cellId = newCell.id;
        renderBracket(bracket);
      }

      state.editingSlotIndex = slotIndex;

      const container = document.getElementById('bracket-container');
      const cellEl = container.querySelector(`.cell[data-slot-index="${slotIndex}"]`);
      if (!cellEl) return;

      // Find or create the text span
      let textEl = cellEl.querySelector('.cell-text');
      if (!textEl) {
        // The cell content may have been set as innerHTML without a span.
        // Wrap existing content in a .cell-text span.
        const existingHtml = cellEl.innerHTML;
        cellEl.innerHTML = '';
        textEl = document.createElement('span');
        textEl.className = 'cell-text';
        textEl.style.display = 'block';
        textEl.style.width = '100%';
        textEl.style.textAlign = 'center';
        textEl.style.outline = 'none';
        textEl.style.wordBreak = 'break-word';
        textEl.innerHTML = existingHtml;
        cellEl.appendChild(textEl);
      }

      // Save text before edit
      const cell = bracket.cells[slot.cellId];
      state.beforeEditText = cell ? cell.text : '';

      cellEl.classList.add('cell-editing');
      cellEl.classList.remove('cell-empty');
      textEl.contentEditable = 'true';
      textEl.focus();

      // Place cursor at end
      const range = document.createRange();
      const sel   = window.getSelection();
      range.selectNodeContents(textEl);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // ── Patch renderBracket to use .cell-text spans and call autoSizeText ─

    const _origRenderBracket = renderBracket;
    renderBracket = function(bracket) {
      _origRenderBracket(bracket);

      // Wrap all cell text in .cell-text spans and apply auto-sizing
      const container = document.getElementById('bracket-container');
      container.querySelectorAll('.cell').forEach(cellEl => {
        // If no .cell-text span yet, wrap existing innerHTML
        if (!cellEl.querySelector('.cell-text')) {
          const existingHtml = cellEl.innerHTML;
          cellEl.innerHTML = '';
          const textEl = document.createElement('span');
          textEl.className = 'cell-text';
          textEl.style.display = 'block';
          textEl.style.width = '100%';
          textEl.style.textAlign = 'center';
          textEl.style.outline = 'none';
          textEl.style.wordBreak = 'break-word';
          textEl.innerHTML = existingHtml;
          cellEl.appendChild(textEl);
        }
        autoSizeText(cellEl);
      });
    };

    // ── Event: click on bracket container (edit delegation) ───────────────

    document.getElementById('bracket-container').addEventListener('click', function(e) {
      const cellEl = e.target.closest('.cell');

      if (!cellEl) {
        // Clicked on empty space — confirm any active edit
        if (state.editingSlotIndex !== null) {
          confirmEdit();
        }
        return;
      }

      // Ignore clicks on format icon or promote button
      if (e.target.closest('.format-icon') || e.target.closest('.promote-btn')) {
        return;
      }

      const slotIndex = parseInt(cellEl.getAttribute('data-slot-index'), 10);

      if (state.editingSlotIndex !== null && state.editingSlotIndex !== slotIndex) {
        // Clicking a different cell: confirm current edit first
        confirmEdit();
      }

      if (state.editingSlotIndex !== slotIndex) {
        enterEditMode(slotIndex);
      }
    });

    // ── Event: keydown for editing ────────────────────────────────────────

    document.addEventListener('keydown', function(e) {
      if (state.editingSlotIndex === null) return;

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        confirmEdit();
      } else if (e.key === 'Escape') {
        // Revert to before-edit text
        const bracket = state.bracket;
        const slot = bracket.slots[state.editingSlotIndex];
        if (slot && slot.cellId && bracket.cells[slot.cellId]) {
          bracket.cells[slot.cellId].text = state.beforeEditText;
        }
        exitEditMode();
        renderBracket(bracket);
      }
      // Shift+Enter: allow default (inserts <br> in contenteditable)
    });

    // ── Event: click outside to confirm ──────────────────────────────────

    document.addEventListener('click', function(e) {
      if (state.editingSlotIndex === null) return;

      const container = document.getElementById('bracket-container');
      // If click is outside the bracket container entirely, confirm
      if (!container.contains(e.target)) {
        confirmEdit();
      }
    });

    // ── Initialize ─────────────────────────────────────────────────────────

    state.bracket = createBracket(16, 'New Bracket');
    renderBracket(state.bracket);
    document.getElementById('bracket-title').textContent = state.bracket.title;
  </script>

</body>
</html>
