name: Deploy Preview Branch

on:
  push:
    branches: ['never-match']
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy as preview'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          path: preview-branch

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r main/* site/
          rm -rf site/.git site/.github
          mkdir -p site/preview
          cp -r preview-branch/* site/preview/
          rm -rf site/preview/.git site/preview/.github

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
